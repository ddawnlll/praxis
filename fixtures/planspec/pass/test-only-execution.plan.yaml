# PRAXIS PlanSpec v0.1 — PASS Fixture: Test-Only Execution Proof
# Expected: schema_valid
# Tests: artifactPolicy.class=test_only, wiringRequired=false, executionRequired=true,
#   integrationContract with runtimeProbes. No import wiring checks triggered.

planSpecVersion: "0.1.0"
kind: "ImplementationPlan"
profile: "praxis-v0.1"

metadata:
  planId: "FIXTURE-PASS-TEST-001"
  title: "Integration Tests"
  description: "Write integration tests."
  createdAt: "2026-06-20T12:00:00Z"
  humanId: "erfolg"
  status: "draft"

authority:
  executor: "ClaudeCode"
  completionAuthority: "PraxisTruthKernel"
  agentSelfReportIsClaimOnly: true
  criteriaSourceRequired: "human"
  reportsAreEvidenceOnly: true
  pluginOwnsTruth: false

workspace:
  root: "."
  allowedFiles:
    - "tests/integration/auth.test.ts"
  forbiddenFiles:
    - "src/"

execution:
  mode: "single_session"
  agent: "claude-code"
  autonomy: "implementation_allowed"
  canModifyCode: true
  canModifyPlan: false
  canModifyAcceptanceCriteria: false
  maxRepairLoops: 2

tasks:
  - id: "task-test"
    title: "Auth Tests"
    objective: "Write tests."
    implementation:
      instructions:
        - "Write tests/integration/auth.test.ts."
    artifactPolicy:
      class: "test_only"
      wiringRequired: false
      reachabilityRequired: false
      executionRequired: true
      deterministicEvidenceRequired: true
    integrationContract:
      mode: "runtime_probe"
      reason: "Test execution proves tests pass."
      runtimeProbes:
        - id: "bun-test"
          commandRef: "CMD-TEST"
          expectedExitCode: 0
    acceptanceCriteria:
      - id: "AC-001"
        description: "Test file exists."
        level: "required"
        humanApproved: true
        criteriaSource: "human"
        verification:
          type: "file_exists"
          path: "tests/integration/auth.test.ts"
          deterministic: true
          canSatisfyFinalGate: true
          advisoryOnly: false
          evidenceRefs:
            - "diff"
        requiredEvidence:
          - "diff"

commands:
  exactAllowedCommands:
    - id: "CMD-TEST"
      kind: "final_validation"
      command: "bun test"
      evidenceRequired: true
      timeoutSeconds: 120
      noTestsFoundIsFailure: true
      watchModeForbidden: true
  validationEvidenceRules:
    finalPromotionRequiresExactAllowedCommand: true
    discoveryCommandsMayNotSatisfyFinalValidation: true
    runtimeGrantCommandsCanSatisfyValidationOnlyIfGrantStatesValidationPurpose: true
  hardDeniedCommands:
    - command: "rm -rf"
      reason: "Destructive."

evidence:
  ledgerRequired: true
  requiredEvidenceTypes:
    - "diff"
    - "test_output"
    - "runtime_probe"
  hashWhenAvailable: true

gates:
  sequence:
    - "SchemaGate"
    - "LockGate"
    - "EvidenceGate"
    - "WiringGate"
    - "ExecGate"
    - "FinalGate"
  verdicts:
    - "PASS"
    - "HOLD"
    - "FAIL"
  reasonCodes: {}

repair:
  enabled: true
  failedCriteriaOnly: true
  mayModifyAcceptanceCriteria: false
  mayModifyPlan: false
  allowedFilesFromFailedTasksOnly: true
  maxRepairLoops: 2
  reverifyCommand: "bun test"
  repairPacketFormat:
    json: true
    markdown: true

locking:
  lockRequired: true
  canonicalHashRequired: true
  planLockFile: ".praxis/planspec.lock"
  hashes:
    - "planHash"
    - "acceptanceCriteriaHash"

reports:
  protocol: "ACCP"
  artifactDirectory: "reports/"
  reportsAreEvidenceOnly: true
  reportsDoNotAuthorizeExecution: true
  commandEvidenceRequired: true
  repairPacketRequiredOnHoldOrFail: true
