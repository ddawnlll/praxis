# =============================================================================
# Executive Summary
# =============================================================================
executive_summary:
  one_paragraph: >
    The pi/ directory contains a mature TypeScript monorepo (pi-monorepo v0.74.0)
    with 12 packages spanning ACCP compilation, execution contracts, execution
    runtime, worker adapters, database persistence, brain orchestration, agent
    runtime, TUI, web server, and web UI. The ACCP compiler and execution-contracts
    packages are well-tested (135 and 247 tests passing respectively), have clean
    API boundaries, and can be directly ported to PRAXIS kernel/accp and
    lib/contracts with moderate adaptation. The execution-runtime has a working FSM
    but is coupled to the old DB schema and coding-agent internals. The remaining
    packages (db, brain, agent, ai, coding-agent, tui, web-server, web-ui,
    worker-adapters, execution-service) are too coupled to the old project or
    irrelevant to PRAXIS and should be reference-only or discarded. Overall, the
    project demonstrates deep understanding of ACCP compilation, evidence
    validation, false-positive detection, and execution lifecycle management, but
    the majority of code is overfit to the old project's specific architecture.
  most_reusable_parts:
    - "accp-compiler: Full deterministic YAML-to-compiled-JSON pipeline with 135 passing tests, clean API, minimal dependencies"
    - "execution-contracts: Clean TypeScript interfaces (WorkerAdapter, IStateStore, ExecutionCommand, AccpReportType, AccpDiagnostic, AccpGateVerdict, AccpRouteSignal)"
    - "execution-runtime/attempt-fsm.ts: Well-defined FSM with 10 states, legal transition validation, deadline policies"
    - "accp-compiler/evidence-validator.ts: False-positive detection (watch mode, zero tests, non-zero exit codes), self-report authority marking"
    - "execution-contracts/types.ts: Dependency inversion ports (AgentRuntime, GovernanceProvider, StorageProvider, InfrastructureProvider)"
  least_reusable_parts:
    - "web-ui: Full React dashboard specific to old project — discard for PRAXIS interface"
    - "coding-agent: Old project's main agent runtime — too coupled, rewrite PRAXIS adapters from scratch"
    - "brain: Orchestration bridge tied to old coding-agent internals"
    - "db: PostgreSQL schema overfit to old project data model"
    - "agent: Agent harness tied to old project tooling"
  main_blockers:
    - "Package namespace coupling: All packages use @earendil-works/pi-* scoped names requiring rename"
    - "DB coupling: execution-runtime imports @earendil-works/pi-db and kysely directly"
    - "Workspace build: TypeScript typecheck fails without npm install workspace symlinks"
    - "Worker adapters have zero tests"
    - "No existing PRAXIS law compliance verification (completion authority, write authority)"
    - "Execution-service test resolution failures (2 of 4 test files fail to resolve packages)"

# =============================================================================
# Final Verdict
# =============================================================================
final_verdict:
  decision: "PORT_AND_ADAPT"
  rationale: >
    The ACCP compiler and execution-contracts packages are genuinely reusable with
    moderate adaptation effort (rename namespace, adapt to PRAXIS directory layout,
    align contracts with PRAXIS laws). The execution-runtime FSM and completion
    predicate provide valuable patterns but need DB decoupling. The remaining
    packages (db, brain, agent, ai, coding-agent, tui, web-server, web-ui,
    worker-adapters, execution-service) are too coupled or irrelevant and should be
    reference-only or discarded. Rewriting PRAXIS kernel from scratch would discard
    ~4000 lines of well-tested compiler and contract code that can be ported in
    3-5 days. However, the execution kernel, adapters, server, and interface layers
    must be rewritten for PRAXIS because they are overfit to the old project.
  confidence: "HIGH"

