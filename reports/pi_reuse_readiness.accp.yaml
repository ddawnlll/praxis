# =============================================================================
# Architecture Fit Analysis
# =============================================================================
architecture_fit_analysis:
  laws:
    completion_authority: "WARN"
    completion_authority_detail: >
      The completion-predicate.ts prevents plans from completing with unresolved
      handoffs and distinguishes SUCCEEDED from FAILED_FINAL. The evidence validator
      detects false positives. However, the system still ultimately trusts the worker's
      self-reported verdict (WorkerVerdict: "complete" | "failed" | "blocked").
      PRAXIS requires Truth Engine FinalGate PASS as the sole completion authority.
      The old system does not fully implement this — it gates on evidence but still
      treats worker self-report as a primary signal.
    write_authority: "WARN"
    write_authority_detail: >
      The state-authority.ts creates tokens for workspace state transitions, and the
      WorkspaceAttemptController uses optimistic locking (version check). This is a
      form of write authority but it is per-controller, not a global Assembler pattern.
      PRAXIS requires a single Deterministic Assembler as the only shared writer.
      The old system distributes write authority across multiple controllers.
    verification_authority: "PASS"
    verification_authority_detail: >
      The evidence validator and gate evaluator form a credible verification system.
      False-positive detection (watch mode, zero tests, non-zero exit codes),
      self-report authority marking, hash verification, and promotion-bearing type
      requirements all contribute to verification authority. These patterns are
      directly applicable to PRAXIS Truth Engine.
  boundaries:
    kernel_fit: >
      MODERATE. The FSM and completion predicate patterns fit kernel/core.
      The WorkspaceAttemptController does NOT fit (too coupled to DB). The
      accp-compiler fits kernel/accp directly.
    adapter_fit: >
      WEAK. The WorkerAdapter interface in execution-contracts is a good starting
      point, but the worker-adapters package has no tests and is coupled to
      coding-agent. PRAXIS adapters should be written from scratch using the
      interface as a contract template.
    hook_fit: >
      UNKNOWN. No hook system exists in the old project. PRAXIS hooks must be
      designed from scratch.
    server_fit: >
      WEAK. The web-server package has no tests and is designed for the old
      project's API surface. SSE/WebSocket patterns are reference-worthy.
    interface_fit: >
      WEAK. The TUI and web-ui packages are overfit to old project data models.
      Reference patterns only.
    lib_contracts_fit: >
      STRONG. The execution-contracts package is the strongest fit. Its zero-
      dependency design, clean interfaces, and comprehensive type definitions
      are directly applicable to PRAXIS lib/contracts.

