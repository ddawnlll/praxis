# =============================================================================
# Detailed Findings
# =============================================================================
detailed_findings:
  - finding_id: "F-001"
    component_id: "C01"
    question_id: "Q-001"
    title: "ACCP compiler is genuinely usable for PRAXIS ACCP 2.0"
    answer_type: "yes_no_with_score_and_evidence"
    verdict: "YES"
    score: 7.5
    evidence: >
      The ACCP compiler implements a deterministic pipeline (extract -> YAML parse
      -> common schema validate -> report schema validate -> evidence validate ->
      gate evaluate -> route signal emit -> IR emit) with 135 passing tests. It
      supports 24 ACCP report types matching the accp_v2_0_package registry.
      Evidence validator detects false positives (watch mode, zero tests, non-zero
      exit codes). Self-report-only evidence is marked as low authority. The
      package has only one external dependency (@earendil-works/pi-execution-contracts
      for types) and is otherwise self-contained. It can be moved to kernel/accp
      with namespace rename and contract path adaptation.
    limitations:
      - "Uses @earendil-works/pi-execution-contracts namespace — needs rename"
      - "TypeScript typecheck needs workspace symlinks (npm install first)"
      - "No ACCP 2.0 strict one-file YAML enforcement beyond existing validators"

  - finding_id: "F-002"
    component_id: "C03"
    question_id: "Q-002"
    title: "Execution runtime has a real TaskRun FSM"
    answer_type: "classification_with_evidence"
    verdict: "REAL_FSM_WITH_DB_COUPLING"
    evidence: >
      The attempt-fsm.ts defines 10 explicit states (PENDING, READY, RUNNING,
      BLOCKED, HANDOFF_REQUIRED, FINAL_VALIDATION, SUCCEEDED, FAILED_FINAL,
      FAILED_RETRYABLE, CANCELLED) with a LEGAL_TRANSITIONS map enforcing valid
      state changes. DEADLINE_POLICY assigns per-state timeouts. The
      WorkspaceAttemptController uses this FSM with event journaling and state
      authority tokens. The completion-predicate.ts computes plan-level lifecycle
      from workspace states. However, the controller is tightly coupled to Kysely
      SQL queries and the old project's DB schema (attempts, handoff_queue tables).
      The FSM logic itself is extractable; the controller is not.

  - finding_id: "F-003"
    question_id: "Q-003"
    title: "Old project solves false-done detection"
    answer_type: "pass_warn_fail_with_evidence"
    verdict: "PASS"
    evidence: >
      The evidence-validator.ts in accp-compiler explicitly checks for false-positive
      patterns: watch mode detection (watchModeForbidden + watchModeDetected),
      no-tests-found detection (noTestsFoundIsFailure + noTestsFound), command-not-found
      detection, timeout detection, and non-zero exit codes. All violations are marked
      as fatal (blocking). Self-report-only evidence (no path/command/hash) is marked
      as warning with code ACCP_EVIDENCE_SELF_REPORT_ONLY. The completion-predicate.ts
      prevents plans from completing with unresolved handoffs. The gate-evaluator
      requires concrete evidence for promotion-bearing report types (PRR, TVR, CAR, FPR).
      These mechanisms together form a credible false-done prevention system.

  - finding_id: "F-004"
    question_id: "Q-004"
    title: "Code movable to lib/contracts without business logic"
    answer_type: "component_list"
    components:
      - "execution-contracts/src/accp-types.ts — ACCP type definitions"
      - "execution-contracts/src/worker-adapter.ts — WorkerAdapter interface"
      - "execution-contracts/src/commands.ts — ExecutionCommand union (after PRAXIS adaptation)"
      - "execution-contracts/src/types.ts — Core execution types (after cleanup)"
      - "execution-contracts/src/events.ts — Event type definitions"
    notes: >
      These files contain pure type/interface definitions with no business logic.
      They can be moved to lib/contracts after namespace rename and PRAXIS law audit.

  - finding_id: "F-005"
    question_id: "Q-005"
    title: "Code movable to kernel/accp directly"
    answer_type: "component_list"
    components:
      - "Entire accp-compiler package after namespace rename"
      - "accp-compiler/src/compiler-pipeline.ts — Compiler pipeline"
      - "accp-compiler/src/gate/gate-evaluator.ts — Gate evaluation"
      - "accp-compiler/src/validation/evidence-validator.ts — Evidence validation"
      - "accp-compiler/src/parser/yaml-parser.ts — YAML parser"
      - "accp-compiler/src/parser/extractor.ts — YAML extractor"
      - "accp-compiler/src/emit/ — All emitters"
    notes: >
      The entire accp-compiler package is a natural fit for kernel/accp. It is the
      second-most portable package after execution-contracts.

  - finding_id: "F-006"
    question_id: "Q-006"
    title: "PRAXIS kernel/core should be rewritten, not ported"
    answer_type: "verdict_with_evidence"
    verdict: "REWRITE"
    evidence: >
      The execution-runtime package has valuable FSM patterns but is too coupled to
      the old project's DB schema (Kysely, pi-db). The execution-service is similarly
      coupled. The admission gate is simple (5 boolean checks). Rewriting the PRAXIS
      kernel from scratch using the FSM and completion-predicate as design references
      will produce cleaner code faster than trying to decouple the old runtime.
      Estimated effort: 5-7 days to decouple vs 3-5 days to rewrite with reference.

  - finding_id: "F-007"
    question_id: "Q-007"
    title: "Tests are strong enough to trust compiler and contracts reuse"
    answer_type: "score_with_test_results"
    score: 7.0
    evidence: >
      accp-compiler: 135/135 tests pass (100%). execution-contracts: 247/247 tests
      pass (100%). execution-runtime: 45/45 tests pass (100%). execution-service:
      29/29 tests pass but 2/4 test files fail resolution (0% for those files).
      db: 9/12 test files pass (75%). worker-adapters: 0 tests. The core reusable
      packages (accp-compiler, execution-contracts) have excellent test coverage.
      The runtime/infrastructure packages have weaker or missing test coverage.

  - finding_id: "F-008"
    question_id: "Q-008"
    title: "Old code is overfit to previous project"
    answer_type: "score_with_coupling_analysis"
    score: 6.5
    coupling_analysis: >
      Low coupling: accp-compiler (1 type dep), execution-contracts (0 runtime deps).
      Medium coupling: execution-runtime (2 deps: contracts + db), ai (provider SDKs).
      High coupling: execution-service (3+ deps), brain, worker-adapters, web-server,
      tui, agent, coding-agent. The packages with low coupling are the ones with
      high reuse scores. The packages with high coupling are overfit and should be
      reference-only or discarded.

  - finding_id: "F-009"
    question_id: "Q-009"
    title: "Reuse/Discard breakdown"
    answer_type: "matrix"
    summary:
      reuse_directly: []
      port_and_adapt:
        - "C01: accp-compiler -> kernel/accp"
        - "C02: execution-contracts -> lib/contracts"
      reference_only:
        - "C03: execution-runtime (FSM + completion predicate patterns)"
        - "C04: execution-service (command/query handler patterns)"
        - "C05: worker-adapters (adapter interface patterns)"
        - "C06: db (schema patterns)"
        - "C11: web-server (SSE/WebSocket patterns)"
        - "C12: tui (TUI patterns)"
      discard:
        - "C07: brain"
        - "C08: agent"
        - "C09: ai"
        - "C10: coding-agent"

  - finding_id: "F-010"
    question_id: "Q-010"
    title: "Reuse saves time on compiler/contracts, rewrite saves time on kernel"
    answer_type: "cost_benefit_analysis"
    estimate:
      port_effort:
        - "accp-compiler: 2-3 days"
        - "execution-contracts: 2-3 days"
        - "Total port: 4-6 days"
      rewrite_effort_if_discarded:
        - "accp-compiler from scratch: 10-15 days"
        - "execution-contracts from scratch: 5-8 days"
        - "Total rewrite of these: 15-23 days"
      net_savings: "9-19 days saved by porting compiler + contracts"
      risk_of_porting: >
        Low for compiler and contracts — they are well-tested with clean boundaries.
        Medium for runtime — decoupling DB would approach rewrite cost.
      recommendation: >
        Port accp-compiler and execution-contracts (save 9-19 days). Rewrite
        execution kernel, adapters, server, and interface from scratch using
        old code as design reference. This avoids hidden technical debt while
        preserving the genuinely reusable components.

