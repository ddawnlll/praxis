# =============================================================================
# Discard List
# =============================================================================
discard_list:
  - component_id: "C07"
    name: "brain"
    reason: "No tests. Tightly coupled to old coding-agent internals. 334 lines of orchestration glue specific to old project. PRAXIS kernel/core replaces this entirely."
  - component_id: "C08"
    name: "agent"
    reason: "Purpose-built for old project's agent architecture. PRAXIS uses external workers via adapters, not an internal agent runtime. Tests exist but test harness assumptions don't carry over."
  - component_id: "C09"
    name: "ai"
    reason: "AI provider abstraction for old project. PRAXIS interfaces with workers via adapters, not direct AI provider calls. Provider abstraction belongs in worker adapters, not as standalone package."
  - component_id: "C10"
    name: "coding-agent"
    reason: "This is the old project's core application. Contains plan execution, workspace management, CLI, extensions — all specific to old project architecture. PRAXIS is a complete architectural restart."
  - component_id: "web-ui"
    name: "web-ui (dashboard, my-chat, example)"
    reason: "Old project's React dashboard. Not applicable to PRAXIS. PRAXIS interface/desktop and interface/ui-core should be built from scratch with PRAXIS-specific design."

