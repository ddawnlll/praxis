schema_gate_implementation:
  file: "src/gates/schemaGate.ts"
  uses_contracts:
    - "validatePlanSpec"
    - "readPlanSpecSchema"
    - "validatePlanSpecSchema"
    - "validatePlanSpecSemantics"
    - "hashPlanSpec"
  input_modes:
    - "planYaml — string"
    - "planPath — file path"
    - "planObject — pre-parsed PlanSpecV01"
  pass_behavior: "Returns PASS with PlanHashes and typed PlanSpecV01"
  fail_behavior: "Returns FAIL with mapped reason codes from contracts diagnostics"
  reason_codes:
    - "SCHEMA_PASS"
    - "YAML_PARSE_ERROR"
    - "PLAN_FILE_EMPTY"
    - "PLAN_ROOT_NOT_OBJECT"
    - "PLAN_SCHEMA_INVALID"
    - "PLAN_SCHEMA_LOAD_ERROR"
    - "PLAN_SCHEMA_REF_ERROR"
    - "PLAN_SEMANTIC_INVALID"
    - "PLAN_HASH_FAILED"
  notes: "Does NOT duplicate contracts parser logic — delegates entirely to @praxis/contracts."

plan_lock_model:
  file_extension: ".lock.yaml"
  version: "praxis-plan-lock/v0.1"
  format: "YAML only — no .json lock files created"
  required_fields:
    - "lockVersion"
    - "planSpecVersion"
    - "kind"
    - "profile"
    - "planId"
    - "createdAt"
    - "updatedAt"
    - "hashes (all 7 PlanHash fields)"
    - "source (schemaPath, optional planPath)"
  helpers:
    - "createPlanLock — constructs from plan + hashes"
    - "readPlanLockYaml — reads and validates .lock.yaml"
    - "writePlanLockYaml — serializes to YAML file"
    - "verifyPlanLock — compares current vs locked hashes with per-field reason codes"

lock_gate_implementation:
  file: "src/gates/lockGate.ts"
  modes:
    verify_existing:
      behavior: "Reads lock, compares planId and all hashes"
      pass: "All hashes match"
      hold: "Lock file missing"
      fail: "Any hash mismatch, version mismatch, bad YAML"
    create_if_missing:
      behavior: "Creates lock only if missing; verifies if exists"
      pass: "Lock created or verified"
    refresh_explicit:
      behavior: "Overwrites lock unconditionally"
      pass: "Lock written"
  hash_mismatch_mapping:
    planHash: "PLAN_LOCK_HASH_MISMATCH"
    acceptanceCriteriaHash: "CRITERIA_CHANGED_AFTER_LOCK"
    artifactPolicyHash: "ARTIFACT_POLICY_CHANGED_AFTER_LOCK"
    integrationContractHash: "INTEGRATION_CONTRACT_CHANGED_AFTER_LOCK"
    commandPolicyHash: "COMMAND_POLICY_CHANGED_AFTER_LOCK"
    allowedFilesHash: "ALLOWED_FILES_CHANGED_AFTER_LOCK"
    forbiddenFilesHash: "FORBIDDEN_FILES_CHANGED_AFTER_LOCK"
  reason_codes: 15 total

p2_pipeline:
  file: "src/runP2Kernel.ts"
  flow: "SchemaGate → [stop if FAIL] → LockGate → [stop]"
  stop_conditions:
    - "SchemaGate FAIL: LockGate skipped, returns FAIL"
    - "SchemaGate PASS without plan/hashes: returns FAIL with SCHEMA_GATE_NO_PLAN"
    - "LockGate completes: returns overall verdict (PASS if both PASS, HOLD if any HOLD, FAIL if any FAIL)"
  ordered_verdicts: "gateVerdicts[0] = SchemaGate, gateVerdicts[1] = LockGate"
  attemptId_stability: "Same attemptId used for both gates"
  forbidden_gates_not_invoked:
    - "EvidenceGate"
    - "WiringGate"
    - "ExecGate"
    - "FinalGate"

