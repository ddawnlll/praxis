parser_implementation:
  file: "src/planspec/parsePlanSpecYaml.ts"
  strategy: "yaml npm package (YAML.parse)"
  errors_handled:
    - "YAML_PARSE_ERROR"
    - "PLAN_FILE_EMPTY"
    - "PLAN_ROOT_NOT_OBJECT"
  notes: "YAML comments are stripped by the parser."

schema_validator_implementation:
  file: "src/planspec/validatePlanSpecSchema.ts"
  library: "ajv (Draft 2020-12 via ajv/dist/2020)"
  formats: "ajv-formats"
  schema_load_strategy: >
    readPlanSpecSchema reads schemas/planspec.v0.1.schema.yaml from disk,
    parses it as YAML, and returns the schema object.
    Default repo root is process.cwd(); configurable via parameter.
  errors_handled:
    - "PLAN_SCHEMA_INVALID"
    - "PLAN_SCHEMA_REF_ERROR"
    - "PLAN_SCHEMA_LOAD_ERROR"
  ajv_options:
    strict: false
    allErrors: true
    verbose: true
    allowUnionTypes: true

semantic_validator_implementation:
  file: "src/planspec/validatePlanSpecSemantics.ts"
  rules_implemented:
    identity:
      - "planSpecVersion must be 0.1.0"
      - "kind must be ImplementationPlan"
      - "profile must be praxis-v0.1"
    uniqueness:
      - "Duplicate task IDs (error)"
      - "Duplicate acceptance criterion IDs globally (error)"
      - "Duplicate command IDs (error)"
    command_refs:
      - "verification.commandRef existence check"
      - "usageProof.commandRef existence check"
      - "runtimeProbe.commandRef existence check"
      - "runnerDiscovery.commandRef existence check"
    evidence_refs:
      - "acceptanceCriteria[].requiredEvidence declared check (warning)"
      - "verification.evidenceRefs mapping check (info)"
    artifact_contract_consistency:
      - "runtime_code/cli_command require integrationContract"
      - "mode=none forbidden for runtime_code/cli_command"
      - "wiringRequired=consumer_or_export requires usageProofs or exportSurfaces"
      - "wiringRequired=runner_discovery requires runnerDiscovery"
      - "reachabilityRequired=true requires entrypoints"
      - "executionRequired=true requires runtimeProbes or usageProofs"
    acceptance_criteria_authority:
      - "humanApproved=false + canSatisfyFinalGate=true (error)"
      - "advisoryOnly=true + canSatisfyFinalGate=true (error)"
      - "agent_draft + canSatisfyFinalGate=true (error)"
      - "deterministic=false + canSatisfyFinalGate=true (error)"
    gates:
      - "Sequence must be SchemaGate→LockGate→...→FinalGate"
      - "Verdicts must include PASS, HOLD, FAIL"
      - "ReasonCodes should include all gate keys (warning)"
    locking:
      - "Required hash fields should be present (warning — schema allows subsets)"
      - "Unknown hash fields flagged (warning)"
    repair_report:
      - "repairPacketRequiredOnHoldOrFail → repair.enabled=true"
      - "failedCriteriaOnly must be true"
      - "mayModifyAcceptanceCriteria must be false"
      - "mayModifyPlan must be false"
  diagnostic_codes:
    - "DUPLICATE_TASK_ID"
    - "DUPLICATE_ACCEPTANCE_CRITERION_ID"
    - "DUPLICATE_COMMAND_ID"
    - "COMMAND_REF_NOT_FOUND"
    - "MISSING_REQUIRED_HASH_FIELD"
    - "INVALID_GATE_SEQUENCE"
    - "FINAL_GATE_UNSUPPORTED_BY_REQUIRED_CRITERION"
    - "REQUIRED_EVIDENCE_NOT_DECLARED"
    - "CONTRACT_MODE_ARTIFACT_POLICY_MISMATCH"
    - "SEMANTIC_IDENTITY_MISMATCH"
    - "UNAPPROVED_FINALGATE_CRITERION"
    - "ADVISORY_FINALGATE_CRITERION"
    - "AGENT_DRAFT_FINALGATE_CRITERION"
    - "REPAIR_REPORT_INCONSISTENT"
    - "HASH_FIELD_MISMATCH"
  known_deferred_kernel_checks:
    - "Runtime wiring import graph analysis (WiringGate)"
    - "Command execution and evidence collection (ExecGate)"
    - "Diff verification against allowed/forbidden files (EvidenceGate)"
    - "Runtime evidence ledger validation"
    - "Repair packet generation"
    - "Circuit breaker / governor runtime checks"

canonicalization_and_hashing:
  canonicalization_strategy: "Recursive key sort + JSON.stringify (no whitespace)"
  hash_algorithm: "SHA-256 (node:crypto)"
  hash_fields:
    - "planHash — full canonical plan"
    - "acceptanceCriteriaHash — all ACs across all tasks"
    - "artifactPolicyHash — task artifact policies"
    - "integrationContractHash — integration contracts (tasks with IC only)"
    - "commandPolicyHash — exactAllowedCommands + hardDeniedCommands"
    - "allowedFilesHash — sorted workspace.allowedFiles"
    - "forbiddenFilesHash — sorted workspace.forbiddenFiles"
  determinism_verified: true
  canonicalization_notes: "Equivalent YAML objects with different key ordering produce identical hashes because keys are sorted before stringification."

