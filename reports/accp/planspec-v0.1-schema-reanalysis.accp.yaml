# ---------------------------------------------------------------------------
# CRITICAL BLOCKERS
# ---------------------------------------------------------------------------
critical_blockers:
  - id: BLK-01
    issue: >-
      All 4 allOf conditional rules at lines 238-294 are DEAD CODE. `required` is
      at the task object level but the fields (class, wiringRequired, reachabilityRequired,
      executionRequired) live under `properties.artifactPolicy`. Every `if` evaluates
      to false. Empirically verified: runtime_code + wiringRequired=true + NO
      integrationContract passes schema validation. The entire artifact-wiring
      enforcement mechanism is non-functional.
    severity: critical
    blocks_adoption: true
    fix_target: >-
      Lines 238-294. Nest each `required: [...]` inside `properties.artifactPolicy`.
      For allOf[0]: move `required: [class]` into `if.properties.artifactPolicy.required`.
      For allOf[1]: move `required: [wiringRequired]` similarly. For allOf[2]: move
      `required: [reachabilityRequired]` similarly. For allOf[3]: move `required:
      [executionRequired]` similarly. Verified: fixed schema correctly rejects and
      accepts test instances.
  - id: BLK-02
    issue: >-
      integrationContract base requires only mode+reason. A runtime_code task with
      integrationContract {mode:"required", reason:"x"} but NO declaredUnits, NO
      integrationPoints, NO entrypoints passes when reachabilityRequired=false and
      executionRequired=false. mode:"none" also passes.
    severity: high
    blocks_adoption: true
    fix_target: >-
      integrationContract $def. When mode != "none", require at least one of:
      declaredUnits, integrationPoints, exportSurfaces, usageProofs, runtimeProbes.
      Add `allOf: [{not: {properties: {mode: {const: "none"}}}}]` → require
      at least one content array with minItems:1.
  - id: BLK-03
    issue: No GateVerdict $def in schema.
    severity: high
    blocks_adoption: false
    fix_target: >-
      Add GateVerdict $def with gate_name, verdict, reason_codes, failed_criteria_ids,
      evidence_refs, repair_hint, attempt_id, timestamp. Or explicitly note that
      GateVerdict is a runtime kernel output (not PlanSpec territory) and reference
      gate-verdict.contract.md.
  - id: BLK-04
    issue: >-
      wiringRequired string-valued modes bypass allOf condition 2 (const:true is
      boolean-only). A task with wiringRequired:"consumer_or_export" (semantically
      wiring-required) does NOT trigger integrationContract enforcement.
    severity: high
    blocks_adoption: false
    fix_target: >-
      Restructure wiringRequired as separate boolean field + optional string mode
      field. OR extend const to enum: [true, "consumer_or_export",
      "runner_discovery"]. Either approach fixes the enforcement gap.
  - id: BLK-05
    issue: NO example plan YAML file exists on disk.
    severity: medium
    blocks_adoption: true
    fix_target: >-
      Create examples/planspec/runtime-code.plan.yaml (PASS scenario with full
      integrationContract) and documentation.plan.yaml (no-wiring scenario).
      Validate both against the schema.

# ---------------------------------------------------------------------------
# CONDITIONAL RULE FINDINGS
# ---------------------------------------------------------------------------
conditional_rule_findings:
  allOf_conditions: 4
  all_of_location: task $def (lines 238-294)
  all_functional: false
  bug_root_cause: >-
    In each `if` block, `required: [...]` is a sibling of `properties:` at the
    task-object level, but the fields being required (class, wiringRequired,
    reachabilityRequired, executionRequired) are nested under
    `properties.artifactPolicy`. JSON Schema `required` applies only to immediate
    properties of the object being validated. The task object has no top-level
    `class` key, so every condition evaluates to false.
  correct_form: >-
    ```yaml
    if:
      properties:
        artifactPolicy:
          properties:
            class:
              enum: [runtime_code, cli_command]
          required: [class]
    ```
  post_fix_verification: >-
    Fixed schema correctly REJECTS runtime_code without integrationContract
    (empirically verified). Correctly ACCEPTS runtime_code with valid
    integrationContract containing declaredUnits.
  secondary_bug_string_wiring_required: >-
    allOf condition 2 uses `wiringRequired: {const: true}` which matches only
    boolean `true`, not string "consumer_or_export". A semantically wiring-required
    string value does NOT trigger integrationContract enforcement.

# ---------------------------------------------------------------------------
# ARTIFACT POLICY FINDINGS
# ---------------------------------------------------------------------------
artifact_policy_findings:
  required_fields: [class, wiringRequired, reachabilityRequired, executionRequired, deterministicEvidenceRequired]
  class_enum_values: 11
  class_enum: [runtime_code, library_code, cli_command, test_only, documentation, config, schema, migration, script, generated_report, fixture]
  class_enum_complete: true
  wiringRequired_issue: >-
    oneOf[boolean, string-enum] creates ambiguity. Boolean true and string modes
    ("consumer_or_export", "runner_discovery") overlap semantically but are treated
    differently by allOf condition 2 (boolean-only). String values bypass enforcement.
  wiringRequired_fix: >-
    Option A: separate fields — `wiringRequired: boolean` + `wiringMode: string`.
    Option B: extend const to enum matching all wiring-required values.
  missing_class_defaults: >-
    No defaults in schema. Task author must declare all 5 artifactPolicy fields
    explicitly. Kernel would provide defaults at runtime. Acceptable for v0.1
    but error-prone.
  no_class_sanity_constraints: >-
    Documentation can declare wiringRequired=true. test_only can declare
    executionRequired=true. No class↔wiringRequired cross-validation.

