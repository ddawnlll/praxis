# ---------------------------------------------------------------------------
# REMAINING OPEN QUESTIONS
# ---------------------------------------------------------------------------
remaining_open_questions:
  - id: OQ-01
    question: >-
      Should the 6-gate sequence be updated in gate-verdict.contract.md
      (currently declares 3 gates as "non-negotiable per Law 1"), or should the
      schema revert to 3 gates and make SchemaGate/LockGate/WiringGate pre-gate
      checks?
  - id: OQ-02
    question: >-
      For v0.1 MVP (1-2 day scaffold), should the 11 artifact classes, 10
      declaredUnit kinds, and 16 verification types be in the v0.1 profile, or in
      a separate advanced profile that is not validated by the v0.1 kernel?
  - id: OQ-03
    question: >-
      Is hardDeniedCommands as a string array sufficient for v0.1 (denied commands
      are simple blacklist entries), or does it need structured objects matching
      exactAllowedCommand for consistent tooling?
  - id: OQ-04
    question: >-
      Should the PlanSpec schema define the GateVerdict runtime object, or should
      GateVerdict be a separate kernel-output schema (referenced from but not
      defined in PlanSpec)?
  - id: OQ-05
    question: >-
      Should artifactPolicyOverride on acceptanceCriterion be guaranteed to be a
      RESTRICTION (subset) of the task-level artifactPolicy, not a relaxation?
      The schema currently allows relaxation (e.g., AC can set wiringRequired:false
      over task wiringRequired:true).
  - id: OQ-06
    question: >-
      When should the deadline for creating the example plan YAML be? The schema
      cannot be adopted as canonical without at least one validating example.

