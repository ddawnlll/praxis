# Legacy planspec.json unchanged: 3f0def1184019398...

report:
  id: PLANSPEC_V0_1_SCHEMA_REANALYSIS
  status: PASS_WITH_FIXES
  status_meaning: >-
    The schema is directionally correct and represents a genuine improvement over
    legacy planspec.json (3.6/10 → 6.7/10). It CAN replace legacy planspec.json as
    the canonical PRAXIS PlanSpec v0.1 AFTER targeted fixes are applied. The dead
    allOf conditionals (lines 238-294) are the single highest-impact defect —
    empirically verified that runtime_code+no integrationContract passes validation.
    Once those conditionals are fixed, the schema's remaining issues are refinement
    (hardening integrationContract content requirements, adding GateVerdict $def,
    constraining cross-field AC invariants, trimming over-engineered v0.1 fields).
    WITH fixes applied the schema reaches ~7.6-8.0/10; without fixes the current
    score is 6.7/10.

# ---------------------------------------------------------------------------
# EXECUTIVE SUMMARY
# ---------------------------------------------------------------------------
executive_summary: |
  The new PRAXIS PlanSpec v0.1 schema (`praxis_planspec_v0_1.schema.yaml`, 921 lines,
  19079 bytes) is a substantial improvement over the legacy `planspec.json` (PlanSpec
  v5-alpha2, 972 lines, P44/v4.11/P45 lineage). The old schema scored 3.6/10 for
  v0.1 fitness; the new schema scores 6.7/10 — approximately doubling viability.

  MAJOR WINS: All P44/v4.11/P45 baggage removed (p45Bridge, v411AdapterRequired,
  runtimeContractVersion, all forbidden terms absent). Kind=ImplementationPlan
  preserved with profile=praxis-v0.1. Root required fields reduced from 17 to 14,
  all justified for v0.1. Task model balances implementation.instructions with
  acceptanceCriteria. acceptanceCriterion is STRUCTURED (7 required fields including
  humanApproved, criteriaSource, verification with deterministic/canSatisfyFinalGate/
  advisoryOnly). exactAllowedCommand is now richly typed (structured objects instead
  of additionalProperties:true). artifactPolicy, integrationContract, WiringGate,
  repair, and locking are all present. 28 $refs, 26 $defs, all resolve.

  CRITICAL BUG — DEAD CONDITIONALS (empirically verified): All 4 allOf conditions
  at lines 238-294 use `required: [class]` / `required: [wiringRequired]` etc.
  at the TASK level, but those fields live under `properties.artifactPolicy`.
  The `if` clauses always evaluate to false, so NO integrationContract enforcement
  fires. Empirically confirmed: a runtime_code task with wiringRequired=true and
  ZERO integrationContract passes schema validation. The fix is simple: nest each
  `required` inside `properties.artifactPolicy` (one-line move per conditional).

  SECONDARY GAPS: (1) integrationContract base requires only mode+reason — an empty
  contract (no declaredUnits, no integrationPoints) passes for runtime_code when
  reachabilityRequired/executionRequired are false. (2) integrationContract.mode
  "none" satisfies the allOf — a none-contract passes. (3) No GateVerdict $def for
  the runtime verdict object. (4) wiringRequired string-valued modes bypass the
  allOf condition 2 (const:true is boolean-only). (5) Cross-field AC invariants
  unenforced (advisoryOnly+canSatisfyFinalGate both true passes). (6) No example
  YAML file exists to validate against.

  OVER-ENGINEERED FOR 1-2 DAY MVP: 7 wiring $defs (declaredUnit, integrationPoint,
  entrypoint, exportSurface, usageProof, runtimeProbe, runnerDiscovery), 16
  verification types, 11 artifact classes, 4 allOf conditions, 7 locking hashes —
  all correct for the full product vision but most will be dead weight in v0.1.

  VERDICT: PASS_WITH_FIXES. The schema cannot be adopted without fixing the dead
  conditionals, but the fix is targeted (one-line per conditional) and the design
  direction is correct. After the critical fix, the schema is suitable as the
  canonical PRAXIS PlanSpec v0.1 replacement for legacy planspec.json.

