# ---------------------------------------------------------------------------
# v0.1 vs ADVANCED PROFILE SPLIT
# ---------------------------------------------------------------------------
v0_1_vs_advanced_profile_split:
  recommended_split:
    v0_1_core:
      - "artifactPolicy (class, wiringRequired: boolean, reachabilityRequired: boolean, executionRequired: boolean)"
      - "integrationContract (mode, reason, declaredUnits, integrationPoints, entrypoints)"
      - "verification.type subset: [file_exists, file_contains, static_pattern, diff_contains, no_diff_contains, command_output, test_output, schema_validation, manual_review, llm_advisory]"
      - "exactAllowedCommand subset: [final_validation, targeted_test, typecheck, lint, build]"
      - "5 locking hashes: [planHash, acceptanceCriteriaHash, artifactPolicyHash, commandPolicyHash, allowedFilesHash]"
    advanced_future:
      - "artifactPolicy: extended string wiring modes"
      - "integrationContract: exportSurfaces, usageProofs, runtimeProbes, runnerDiscovery, forbiddenOrphanModules"
      - "verification.type: [import_graph, entrypoint_reachability, runtime_probe, integration_contract, runner_discovery]"
      - "declaredUnit: expectedExports, requiredPatterns, language"
      - "integrationPoint: expectedImports, expectedRegistrationPatterns"
      - "entrypoint: requiredReachabilityFrom"
      - "7 locking hashes (full set)"
      - "waves[], workspaces[] (future multi-worker profile)"
    profile_switch: >-
      profile: praxis-v0.1-lite (MVP core) vs profile: praxis-v0.1 (full) vs
      profile: praxis-future (multi-worker). The schema currently supports only
      profile: praxis-v0.1 (const) with all fields in one profile.

