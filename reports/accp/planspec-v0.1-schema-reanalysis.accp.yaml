  structured: true
  required_fields: [id, description, level, humanApproved, criteriaSource, verification, requiredEvidence]
  id_pattern: "^AC-[A-Za-z0-9_.-]+$"
  level_enum: [required, optional, advisory]
  criteriaSource_enum: [human, imported_human, agent_draft]
  verification_authority_fields: [deterministic, canSatisfyFinalGate, advisoryOnly, evidenceRefs]
  cross_field_invariants_missing:
    - "advisoryOnly:true + canSatisfyFinalGate:true should fail (one criterion cannot both be advisory and satisfy FinalGate)"
    - "deterministic:false + canSatisfyFinalGate:true should WARN (non-deterministic evidence as FinalGate-satisfying)"
    - "criteriaSource:agent_draft + level:required should WARN (agent-drafted criteria at required level)"
    - "humanApproved:false + canSatisfyFinalGate:true should FAIL (unapproved criteria cannot satisfy FinalGate)"
  agent_draft_loophole: >-
    A criterion with criteriaSource:agent_draft, humanApproved:false, level:required
    validates cleanly. The schema gives zero signal that this combination cannot
    satisfy FinalGate.
  artifactPolicyOverride_risk: >-
    artifactPolicyOverride is a full $ref to artifactPolicy with no restriction that
    it must be a SUBSET of the task-level policy. An AC could relax wiringRequired
    from true to false, creating a per-AC escape hatch.
  verification_type_count: 16
  advanced_types_in_v0_1: [import_graph, entrypoint_reachability, runtime_probe, integration_contract, runner_discovery]
  advanced_types_concern: >-
    These types are accepted by schema even if the v0.1 kernel cannot verify them.
    Author can declare unverifiable verification types.

# ---------------------------------------------------------------------------
# COMMAND / EVIDENCE / REPORT FINDINGS
# ---------------------------------------------------------------------------
command_evidence_report_findings:
  exactAllowedCommand_improvement: significant
  exactAllowedCommand_fields: [id, kind, command, evidenceRequired, timeoutSeconds, cwd, noTestsFoundIsFailure, watchModeForbidden, expectedExitCode, networkAllowed, shellAllowed, expectedOutputPatterns]
  command_kind_enum: [final_validation, targeted_test, typecheck, lint, build, runtime_probe, discovery]
  validationEvidenceRules_preserved:
    - finalPromotionRequiresExactAllowedCommand (const:true)
    - discoveryCommandsMayNotSatisfyFinalValidation (const:true)
    - runtimeGrantCommandsCanSatisfyValidationOnlyIfGrantStatesValidationPurpose
  validationEvidenceRules_dropped:
    - accpCompileCommandsCanSatisfyAccpValidationOnlyIfArtifactHashRecorded
  hardDeniedCommands_regression: >-
    Now a bare string array (vs old schema's object array). Should match
    exactAllowedCommand structure for consistency (denied commands need
    id/kind/pattern/reason to produce actionable violation messages).
  evidence_strong: ledgerRequired const:true, requiredEvidenceTypes, hashWhenAvailable
  evidenceType_enum_values: [diff, source, wiring, command, test_output, runtime_probe, schema_validation, manual_review, llm_advisory, report]
  evidenceType_dropped_fields_ok: confidenceEnum (high/medium/low) correctly dropped as contract forbids confidence in verdicts
  reports_strong: protocol=ACCP const, reportsAreEvidenceOnly const:true, reportsDoNotAuthorizeExecution const:true, commandEvidenceRequired, repairPacketRequiredOnHoldOrFail

# ---------------------------------------------------------------------------
# REPAIR / LOCKING FINDINGS
# ---------------------------------------------------------------------------
repair_locking_findings:
  repair_const_locked: true
  repair_failedCriteriaOnly: const true
  repair_mayModifyAcceptanceCriteria: const false
  repair_mayModifyPlan: const false
  repair_maxRepairLoops: maximum 10
  repairPacketFormat: json + markdown
  repair_enabled_dead_end: >-
    If repair.enabled=false but reports.repairPacketRequiredOnHoldOrFail=true,
    the schema has an unresolved contradiction — a repair packet is required but
    repair is disabled. Either constrain enabled=true when repairPacketRequired
    or document that the packet is still produced for human review.
  locking_hash_count: 7
  locking_hashes: [planHash, acceptanceCriteriaHash, artifactPolicyHash, integrationContractHash, commandPolicyHash, allowedFilesHash, forbiddenFilesHash]
  locking_hashes_justified: true (each protects a real mutable policy surface)
  locking_hash_mismatch_undefined: >-
    Schema declares which hashes exist but does NOT define the consequence
    of mismatch (spec changed after lock → FAIL). Kernel-logic territory
    but a const field like hashMismatchVerdict: FAIL would make the contract explicit.

# ---------------------------------------------------------------------------
# v0.1 SIMPLICITY FINDINGS
# ---------------------------------------------------------------------------
v0_1_simplicity_findings:
  server_runtime_desktop_clean: true
  execution_mode: single_session (const)
  execution_agent: claude-code (const)
  agent_executor_inconsistency: >-
    authority.executor enum includes ClaudeCode/Human/OtherAgent but
    execution.agent only has claude-code. Minor inconsistency.
  import_graph_not_required: true (one of 16 verification types, optional)
  over_engineered_for_1_2_day_mvp:
    - "declaredUnit with expectedExports/requiredPatterns/language"
    - "integrationPoint with expectedImports/expectedRegistrationPatterns"
    - "entrypoint with requiredReachabilityFrom"
    - "exportSurface with requiredExports"
    - "runtimeProbe/usageProof/runnerDiscovery with commandRef"
    - "7 locking hashes"
    - "16 verification.type options"
    - "11 artifactPolicy.class values"
    - "10 declaredUnit.kind values"
    - "4 conditional allOf rules"
  v0_1_simplicity_ok: false
  note: >-
    These fields are correct for the full product vision but most will be dead
    weight in the first MVP scaffold. Consider a separate v0.1 profile that only
    requires the subset implementable in 1-2 days.

# ---------------------------------------------------------------------------
# RECOMMENDED SCHEMA PATCHES
# ---------------------------------------------------------------------------
recommended_schema_patches:
  - id: FIX-01
    priority: P0-critical
    target: task.allOf conditions 1-4 (lines 238-294)
    change: >-
      Nest each `required: [...]` inside `if.properties.artifactPolicy`. For allOf[0]:
      move `required: [class]` → `if.properties.artifactPolicy.required: [class]`.
      Similarly for allOf[1] (wiringRequired), allOf[2] (reachabilityRequired), allOf[3]
      (executionRequired). Empirically verified: fix is correct.
    score_impact: S1+0.15 S5+0.15 S6+0.15 (~+0.45 total)

  - id: FIX-02
    priority: P0-critical
    target: integrationContract base requirements
    change: >-
      Add to integrationContract: when mode != "none" AND class is runtime_code/cli_command/
      library_code, require at least one of [declaredUnits, integrationPoints,
      exportSurfaces, usageProofs, runtimeProbes] with minItems:1. Use allOf
      conditional: `if: {properties: {mode: {not: {const: "none"}}}}` → then require
      at least one content array.
    score_impact: S6+0.10 S4+0.05 (~+0.15 total)

  - id: FIX-03
    priority: P1-high
    target: acceptanceCriterion cross-field constraints
    change: >-
      Add allOf rules: (1) not: {properties: {advisoryOnly: {const: true},
      canSatisfyFinalGate: {const: true}}}; (2) not: {properties:
      {humanApproved: {const: false}, canSatisfyFinalGate: {const: true}}};
      (3) if criteriaSource==agent_draft then advisoryOnly must be true.
    score_impact: S4+0.20 (~+0.20 total)

  - id: FIX-04
    priority: P1-high
    target: wiringRequired type
    change: >-
      Option A (simpler): replace oneOf with separate `wiringRequired: boolean` and
      `wiringMode: string` fields. allOf condition 2 uses boolean field only.
      Option B: change allOf condition 2 const to enum covering both boolean true
      and string modes ["consumer_or_export", "runner_discovery"].
    score_impact: S5+0.20 (~+0.20 total)

  - id: FIX-05
    priority: P1-high
    target: GateVerdict $def
    change: >-
      Add $defs.gateVerdict with gate_name (enum EvidenceGate/WiringGate/ExecGate/
      FinalGate), verdict (enum PASS/HOLD/FAIL), reason_codes (string[]),
      failed_criteria_ids (string[]), evidence_refs (string[]), repair_hint (string|null),
      attempt_id (string), timestamp (string format:date-time).
    score_impact: S7+0.15 (~+0.15 total)

  - id: FIX-06
    priority: P2-medium
    target: hardDeniedCommands structure
    change: >-
      Match exactAllowedCommand structure: add $defs.deniedCommand with id, kind,
      command, reason fields. Replace string array with array of deniedCommand objects.
    score_impact: S8+0.08

  - id: FIX-07
    priority: P2-medium
    target: Create example plan files
    change: >-
      Create examples/planspec/runtime-code.plan.yaml (full integrationContract,
      entrypoints, runtimeProbes, command evidence, humanApproved ACs) and
      examples/planspec/documentation.plan.yaml (wiringRequired=false, no
      integrationContract). Validate both against schema.
    score_impact: S1+0.08

  - id: FIX-08
    priority: P2-medium
    target: commandRef cross-reference
    change: >-
      Add pattern "^CMD-[A-Za-z0-9_.-]+$" to usageProof.commandRef,
      runtimeProbe.commandRef, runnerDiscovery.commandRef. Add description
      noting they reference exactAllowedCommand.id.
    score_impact: S6+0.05

  - id: FIX-09
    priority: P2-medium
    target: repair.enabled vs repairPacketRequiredOnHoldOrFail
    change: >-
      Add if/then: if repairPacketRequiredOnHoldOrFail=true then repair.enabled
      must be true. Or document that repair packet is always produced for human
      review even when autonomous repair is disabled.
    score_impact: S9+0.05

  - id: FIX-10
    priority: P3-low
    target: over-engineered v0.1 fields
    change: >-
      Mark advanced fields as optional/default-false for v0.1: import_graph,
      entrypoint_reachability, runtime_probe, runner_discovery verification types;
      declaredUnit.expectedExports/requiredPatterns/language; integrationPoint.
      expectedImports/expectedRegistrationPatterns; entrypoint.
      requiredReachabilityFrom. Or move to advanced profile.
    score_impact: S10+0.15

