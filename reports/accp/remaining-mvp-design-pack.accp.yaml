# ---------------------------------------------------------------------------
# DESIGN DECISIONS
# ---------------------------------------------------------------------------
design_decisions:
  - id: "DD-001"
    decision: "EvidenceLedger format is JSONL (not YAML)"
    rationale: "Append-only streaming matches evidence capture semantics. YAML's complexity adds no value for machine-generated records."

  - id: "DD-002"
    decision: "EvidenceGate verifies namespace/diff/integrity — NOT correctness"
    rationale: "Boundary integrity before semantic checks. Correctness belongs to FinalGate."

  - id: "DD-003"
    decision: "WiringGate v0.1 is static file matching only (no AST)"
    rationale: "AST import-graph analysis requires heavy dependencies. Static checks catch 80%+ of wiring failures."

  - id: "DD-004"
    decision: "ExecGate only runs exactAllowedCommands — no free-form shell"
    rationale: "Pre-declared commands with timeout/exit/network policies. Any unlisted command is rejected."

  - id: "DD-005"
    decision: "FinalGate rejects advisory-only criteria for PASS"
    rationale: "Prevents false PASS from subjective judgments. Advisory criteria produce HOLD, not PASS."

  - id: "DD-006"
    decision: "RepairPacket is JSON (not YAML or Markdown)"
    rationale: "Machine-consumed, not human-read. CLI formatting handles human readability."

  - id: "DD-007"
    decision: "Reports are dual-format (ACCP YAML + summary.md)"
    rationale: "YAML for machines/CI. MD for humans/commits. Both generated from same data."

  - id: "DD-008"
    decision: "CLI is thin orchestrator — no gate logic"
    rationale: "Prevents CLI-specific bugs from producing false PASS. All logic in @praxis/kernel."

  - id: "DD-009"
    decision: "Plugin bridge is read-only display + slash command dispatch"
    rationale: "Law 3 enforcement: plugin never decides truth, never modifies criteria."

  - id: "DD-010"
    decision: "4 implementation phases (P3-P6) with explicit ACs"
    rationale: "Each phase independently testable. P3/P5 are high-risk, P4/P6 more mechanical."

