# ---------------------------------------------------------------------------
# SCORECARD
# ---------------------------------------------------------------------------
scorecard:
  total_score_out_of_10: 3.6
  advanced_format_score_out_of_10: 7.0
  scoring_note: >-
    v0.1 fitness is below the prompt's non-binding expected range (5.5-6.8) for a
    concrete, evidence-backed reason: planspec.json is a foreign Pi P44/v4.11/P45
    schema with ZERO field-name overlap with PRAXIS's own contracts and forces
    v0.1-excluded multi-worker fields as required. The expected range assumed the
    schema was PRAXIS's own PlanSpec; it is not. Advanced-format score is also below
    the expected 7.5-8.5 because the missing artifact/wiring/repair layer and P44
    legacy baggage matter even at scale, and the schema is misaligned with PRAXIS's
    own plan-spec.contract.md future PlanSpec.
  dimensions:
    - id: S1
      name: Schema correctness and strictness
      max_points: 1.0
      score: 0.60
      evidence: >-
        Valid Draft 2020-12 schema (meta-validated via jsonschema 4.26.0); all 11
        $ref resolve; root additionalProperties:false (intentional strict envelope).
        Deductions: 17 required root fields too heavy for v0.1; metadata.status enum
        (draft/validated/locked/admitted/running/completed/superseded) and
        intent.parallelism(max 20) are multi-worker lifecycle, not v0.1; "strict
        container, loose payload" — acceptanceCriteria items are
        additionalProperties:true (unstructured), so strictness does not reach the
        most important payload; $defs/security is dead code (defined, never $ref'd;
        root security is an inline duplicate).
    - id: S2
      name: Plugin-first v0.1 fit
      max_points: 1.0
      score: 0.30
      evidence: >-
        Forces v0.1-excluded orchestration as REQUIRED: waves[], workspaces[] (with
        waveId/batchSize/gate), intent.parallelism, locking (workerMustEchoWorkspace
        LockHash), compatibility (runtimeContractVersion/v411AdapterRequired),
        authority, enforcementRegistry. Does not force Desktop/server/PostgreSQL
        specifically, but does force the multi-worker/runtime substrate ADR-013
        excludes. A single-session manual verify/repair task cannot be expressed
        without populating all of these. No plugin coupling (neutral).
    - id: S3
      name: Artifact classification
      max_points: 1.0
      score: 0.15
      evidence: >-
        No artifactPolicy, no artifact class enum, no per-class wiring expectation.
        Only adjacent concepts: workspace.role (free string), p45Bridge.artifactExports
        (type/path, P45-specific), reports.artifactDirectory. Cannot distinguish
        runtime_code from documentation/config/test_only; cannot prevent import checks
        on non-code artifacts; cannot require explicit policy for runtime_code.
    - id: S4
      name: Wiring and integration contract
      max_points: 1.25
      score: 0.15
      evidence: >-
        No wiringRequired, declaredUnits, entrypoints, integrationPoints, exportSurfaces,
        usageProofs, runtimeProbes, import-graph, reachability, or orphan-module
        detection. Only graph-like concepts are workspace.dependencies and
        wave.dependencies (task/wave dependency arrays) and wave.gate.commandRefs/
        requiredArtifacts — these are orchestration-level, not code-wiring-level.
        The single biggest false-done-prevention gap.
    - id: S5
      name: Executable evidence and command policy
      max_points: 1.0
      score: 0.90
      evidence: >-
        Strongest dimension. validation.finalValidationCommandRefs +
        commands.validationEvidenceRules.finalPromotionRequiresExactAllowedCommand;
        validation.noTestsFoundIsFailure; discoveryCommandsMayNotSatisfyFinalValidation
        (distinguishes discovery from final validation); commandEvidenceRequired;
        exactAllowedCommands; hardDeniedCommands; commandClasses; runtimeCommandGrant;
        reports.commandEvidenceRequired. Tiny deduction: exactAllowedCommands/
        commandClasses/hardDeniedCommands items are additionalProperties:true, so
        command-object shape is not enforced.
    - id: S6
      name: Acceptance criteria traceability
      max_points: 1.0
      score: 0.25
      evidence: >-
        workspace.acceptanceCriteria items are additionalProperties:true — totally
        unstructured. Schema cannot enforce id/description/verification_method/
        verification_detail/required_evidence/required/human_approved/criteria_source.
        No human_approved, no human_id, no criteria_source — FinalGate's Law-3 core
        is not expressible. Partial credit: validation.forbiddenPatterns,
        security.forbiddenFiles, workspace.forbiddenFiles give workspace-level
        negative assertions; validation.finalValidationCommandRefs links validation
        to commands. (The task.yaml contract DOES structure AC; planspec.json does not.)
    - id: S7
      name: Gate model support
      max_points: 1.0
      score: 0.35
      evidence: >-
        evidence block (ledgerRequired/requiredEvidenceTypes/evidenceItemRequiredFields/
        hashWhenAvailable) and validation/commands blocks back EvidenceGate/ExecGate
        conceptually, but there is NO formal gate model in-schema: no gate enum, no
        PASS/HOLD/FAIL verdict enum, no gate sequencing, no WiringGate, no reason_codes.
        FinalGate's human-approval core is missing (no human_approved/criteria_source).
        The gate model lives in docs/contracts/gate-verdict.contract.md, not the schema.
    - id: S8
      name: Repair loop support
      max_points: 0.75
      score: 0.10
      evidence: >-
        No RepairPacket schema, no failedCriteriaOnly, no mayModifyAcceptanceCriteria,
        no reverifyCommand, no repairInstructions. Only adjacency: workspace.rollback
        (additionalProperties:true) and reports.rollbackPlanRequiredForMutation
        (mutation rollback, not criteria repair). The RepairPacket contract exists in
        docs but is absent from the schema.
    - id: S9
      name: Operational simplicity for 1-2 day v0.1
      max_points: 1.0
      score: 0.15
      evidence: >-
        17 required root fields including waves[]/workspaces[]/locking/compatibility.
        No lite profile, no profile selection, no single-task mode. Not what
        /praxis:init generates (design: init generates task.yaml). Too heavy to author
        or validate quickly for a 1-2 day MVP.
    - id: S10
      name: Forward compatibility
      max_points: 1.0
      score: 0.60
      evidence: >-
        Preserves strong reusable primitives: command policy, evidence ledger, ACCP
        report authority (reportsAreEvidenceOnly/reportsDoNotAuthorizeExecution/
        routeSignalsAreAdvisory), lock/hash, allowed/forbidden files, wave/workspace
        orchestration, dependency graphs, migration mapping. Deductions: already
        multi-worker-heavy (would infect v0.1 if used); misaligned with PRAXIS's own
        plan-spec.contract.md future PlanSpec (different field names); carries P44/
        v4.11/P45 legacy (p45Bridge, v411AdapterRequired) that is not PRAXIS's forward
        path.

# ---------------------------------------------------------------------------
# CURRENT STRENGTHS (keep these)
# ---------------------------------------------------------------------------
current_strengths:
  - id: ST-01
    field: commands.validationEvidenceRules
    note: >-
      finalPromotionRequiresExactAllowedCommand + discoveryCommandsMayNotSatisfy
      FinalValidation + runtimeGrantCommandsCanSatisfyValidationOnlyIfGrantStates
      ValidationPurpose + accpCompileCommandsCanSatisfyAccpValidationOnlyIfArtifact
      HashRecorded. This is an excellent command-evidence authority model and maps
      directly to ExecGate. KEEP and port into the v0.1 format.
  - id: ST-02
    field: validation (finalValidationCommandRefs, noTestsFoundIsFailure, commandEvidenceRequired, discoveryCommandsMayNotSatisfyFinalValidation, watchModeForbidden, forbiddenPatterns)
    note: >-
      Distinguishes discovery from final validation, rejects no-tests-found, requires
      command evidence. Direct ExecGate support. KEEP.
  - id: ST-03
    field: evidence (ledgerRequired, requiredEvidenceTypes, evidenceItemRequiredFields, hashWhenAvailable, accpArtifactHashRequired)
    note: Evidence-ledger + required-fields + hash model. Direct EvidenceGate support. KEEP.
  - id: ST-04
    field: reports (reportsAreEvidenceOnly, reportsDoNotAuthorizeExecution, routeSignalsAreAdvisory, rollbackPlanRequiredForMutation, stableIdsRequired)
    note: >-
      Report-authority model: reports are evidence only, never authorize execution,
      route signals are advisory. Aligns with Law 1. KEEP.
  - id: ST-05
    field: security (schemaValidationRequired, lockRequiredForExecution, canonicalJsonHashRequired, signatureRequired, hardStops, forbiddenFiles)
    note: Plan-level lock/hash/signature + hard stops + forbidden files. Strong integrity model. KEEP (lightweight subset for v0.1).
  - id: ST-06
    field: workspace.allowedFiles / workspace.forbiddenFiles / security.forbiddenFiles
    note: Allowed/forbidden file model with minItems:1 on allowedFiles. KEEP.
  - id: ST-07
    field: wave.gate (commandRefs, requiredArtifacts, required)
    note: Per-wave gate with command refs and required artifacts. Useful pattern for future waves; not v0.1.
  - id: ST-08
    field: dependency graphs (workspace.dependencies, wave.dependencies)
    note: Orchestration-level dependency graph. Useful for future multi-worker; not v0.1 wiring.
  - id: ST-09
    field: brief (mission, hardRequirements, antiPatterns, operatorNotes) with instruction/briefNote priority (must/should/may)
    note: Structured intent + priority levels. The must/should/may priority is a useful pattern for deterministic/advisory distinction. KEEP concept.

# ---------------------------------------------------------------------------
# CRITICAL GAPS
# ---------------------------------------------------------------------------
critical_gaps:
  - id: CG-01
    gap: No artifactPolicy / artifact class classification
    severity: critical
    impact: >-
      Cannot distinguish runtime_code from documentation/config/test_only/schema/
      migration/script/fixture. Cannot prevent false-HOLD on docs/config (which
      correctly need no import wiring) nor false-PASS on runtime_code that exists
      but is unwired. Blocks S3.
  - id: CG-02
    gap: No integrationContract / wiring / reachability
    severity: critical
    impact: >-
      Cannot express wiringRequired, declaredUnits, entrypoints, exportSurfaces,
      integrationPoints, usageProofs, runtimeProbes, import-graph verification, or
      orphan-module detection. This is the core false-done-prevention gap: an agent
      can produce a file that passes file_exists but is never wired into the
      architecture. Blocks S4; undermines the audit's central critical_question.
  - id: CG-03
    gap: acceptanceCriteria is unstructured (additionalProperties:true)
    severity: critical
    impact: >-
      Schema cannot enforce AC id/description/verification_method/required_evidence/
      required/human_approved/criteria_source. No AC->evidence mapping, no human-
      approval semantics (Law 3), no criteria_source enforcement at schema level.
      Blocks S6; FinalGate's core is not expressible. (task.yaml contracts this;
      planspec.json does not.)
  - id: CG-04
    gap: No RepairPacket schema and no formal gate/verdict model
    severity: high
    impact: >-
      No PASS/HOLD/FAIL enum, no gate enum, no gate sequencing, no WiringGate, no
      reason_codes, no failedCriteriaOnly repair contract, no mayModifyAcceptance
      Criteria, no reverifyCommand. Blocks S7/S8. The gate/repair model exists only
      in docs, not in the schema.
  - id: CG-05
    gap: Forced multi-worker weight + wrong lineage
    severity: high
    impact: >-
      17 required root fields incl waves[]/workspaces[]/locking/compatibility
      (v0.1-excluded). Zero field-name overlap with PRAXIS's own contracts. P44/
      v4.11/P45 baggage (p45Bridge, v411AdapterRequired, migration.legacyFieldsMapped).
      Blocks S2/S9; makes direct v0.1 use impractical and misaligned.
  - id: CG-06
    gap: No deterministic-vs-advisory verification authority model
    severity: medium
    impact: >-
      No per-verification deterministic/canSatisfyFinalGate/advisoryOnly fields.
      Cannot state which evidence types can satisfy FinalGate vs which are advisory.
      (task.yaml has a coarse required:true/false; planspec.json has neither.)
  - id: CG-07
    gap: Dead code / strictness unevenness
    severity: low
    impact: >-
      $defs/security is defined but never $ref'd (root security is an inline
      duplicate). 13 open payload objects (acceptanceCriteria, workspace.validation/
      reports/rollback/risk, command arrays, authority.*) undermine the strict
      envelope. Cosmetic + consistency issue.

# ---------------------------------------------------------------------------
# ARTIFACT POLICY GAP
# ---------------------------------------------------------------------------
artifact_policy_gap:
  present_in_schema: false
  present_in_docs: false
  finding: >-
    No artifactPolicy or artifact_class concept exists anywhere in planspec.json or
    in any docs/ file (confirmed by per-term grep: artifactPolicy/artifact_policy/
    artifactClass/artifact_class return zero matches across docs/). The only
    artifact-adjacent concepts are workspace.role (free string), p45Bridge.
    artifactExports (P45-specific type/path), and reports.artifactDirectory.
  required_classes_for_praxis:
    runtime_code:
      wiring_expectation: explicit_required
      required_checks: [defined unit exists, export exists if expected, import/register pattern exists, entrypoint reachability exists, runtime probe or integration test evidence exists]
    library_code:
      wiring_expectation: consumer_or_export
      required_checks: [defined unit exists, public export or consumer import or test usage exists]
    cli_command:
      wiring_expectation: required
      required_checks: [command registered in bin/CLI router, command invocation test or smoke evidence exists]
    test_only:
      wiring_expectation: not_import_required
      required_checks: [test runner discovers it, test command executes it]
    documentation:
      wiring_expectation: not_import_required
      required_checks: [file exists, required content patterns exist, links/anchors if declared]
    config:
      wiring_expectation: conditional
      required_checks: [schema valid if applicable, referenced by configured command or runtime if declared]
    schema:
      wiring_expectation: conditional
      required_checks: [schema validates, validator references it if declared]
    migration:
      wiring_expectation: runner_registration_not_import
      required_checks: [migration file exists, migration runner/listing can discover it]
    script:
      wiring_expectation: conditional
      required_checks: [script is callable through package script/bin if declared]
    fixture:
      wiring_expectation: optional_or_test_usage
      required_checks: [referenced by test if declared]
    generated_report:
      wiring_expectation: not_import_required
      required_checks: [file exists, report is evidence only]
  proposed_shape:
    location: ["acceptanceCriteria[].artifactPolicy", "task-level artifactPolicy defaults"]
    fields:
      class: { enum: [runtime_code, library_code, cli_command, test_only, documentation, config, schema, migration, script, generated_report, fixture] }
      wiringRequired: { enum: [true, false, consumer_or_export, runner_discovery, conditional] }
      reachabilityRequired: { type: boolean }
      executionRequired: { type: boolean }
      advisoryReviewAllowed: { type: boolean }
      deterministicEvidenceRequired: { type: boolean }

# ---------------------------------------------------------------------------
# INTEGRATION CONTRACT GAP
# ---------------------------------------------------------------------------
integration_contract_gap:
  present_in_schema: false
  present_in_docs: false
  finding: >-
    No integrationContract concept anywhere in planspec.json or docs/ (per-term grep
    for integrationContract/integration_contract/declaredUnits/exportSurfaces/
    usageProofs/integrationPoints/runtimeProbe all return zero matches). The only
    "orphan" mention in the repo is docs/contracts/plan-spec.contract.md Q5, an OPEN
    question about "no orphan tasks" (task dependency graph), not module orphan
    detection, and it is not in the schema.
  proposed_shape:
    location: ["acceptanceCriteria[].integrationContract", "task-level integrationContract"]
    required_when: wiringRequired is true OR reachabilityRequired is true OR executionRequired is true
    fields:
      mode: { enum: [none, required, consumer_or_export, runner_discovery, runtime_probe, manual_only] }
      reason: { type: string }
      declaredUnits: { type: array }
      integrationPoints: { type: array }
      entrypoints: { type: array, required_when: reachabilityRequired is true }
      exportSurfaces: { type: array }
      usageProofs: { type: array }
      runtimeProbes: { type: array, required_when: executionRequired is true }
      forbiddenOrphanModules: { type: boolean }

# ---------------------------------------------------------------------------
# WIRING GATE GAP
# ---------------------------------------------------------------------------
wiring_gate_gap:
  wiring_gate_in_design: false
  wiring_gate_in_schema: false
  finding: >-
    WiringGate appears NOWHERE in planspec.json or in any docs/ file (confirmed by
    per-term grep). The PRAXIS design uses exactly three gates — EvidenceGate,
    ExecGate, FinalGate (docs/contracts/gate-verdict.contract.md,
    docs/pipelines/local-truth-kernel-flow.md). EvidenceGate does check NAMESPACE_
    VIOLATION (file-path changes outside declared namespace -> FAIL) and DIFF_EMPTY,
    but this is a file-path namespace check, NOT import wiring / reachability. So
    the audit's WiringGate is an aspirational gap, not an existing concept.
  can_schema_prevent_false_pass_on_unwired_code: false
  can_schema_prevent_false_hold_on_docs_config: false
  explanation: >-
    Because there is no artifactPolicy, the schema cannot say "this AC is for a
    documentation file, so do not require import wiring" (false-HOLD risk on docs)
    nor "this AC is for runtime_code, so require import/register + entrypoint
    reachability" (false-PASS risk on unwired code). The wiring gate is the missing
    layer that would close both risks.
  proposed_formal_model:
    gate_sequence: EvidenceGate -> WiringGate -> ExecGate -> FinalGate
    verdict_enum: [PASS, HOLD, FAIL]
    wiring_gate_checks:
      - declared unit exists for runtime_code/cli_command/library_code
      - export exists when exportSurfaces declared
      - import/register pattern exists when wiringRequired=true
      - entrypoint reachability exists when reachabilityRequired=true
      - runtime probe / integration test evidence exists when executionRequired=true
      - no orphan module when forbiddenOrphanModules=true
    hold_conditions:
      - class=runtime_code but integrationContract missing
      - reachabilityRequired=true but no entrypoints declared
      - executionRequired=true but no runtimeProbes/usageProofs declared
      - class omitted (under-specified artifact)

# ---------------------------------------------------------------------------
# GATE FIT SECTIONS
# ---------------------------------------------------------------------------
evidence_gate_fit:
  supportable: partial
  schema_primitives: [evidence.ledgerRequired, evidence.requiredEvidenceTypes, evidence.evidenceItemRequiredFields, evidence.hashWhenAvailable, validation.commandEvidenceRequired, reports.commandEvidenceRequired]
  gaps: >-
    No formal EvidenceGate definition in-schema; no verdict enum; no reason_codes
    (EVIDENCE_EMPTY/DIFF_EMPTY/NAMESPACE_VIOLATION live only in docs). EvidenceGate's
    namespace check is file-path based (workspace.allowedFiles/forbiddenFiles +
    security.forbiddenFiles), not import-based. No empty-diff rule in-schema
    (validation has noTestsFoundIsFailure but not diffEmptyIsFailure).
  score_contribution: supports S5/S7 partially.

exec_gate_fit:
  supportable: strong
  schema_primitives: [validation.finalValidationCommandRefs, validation.noTestsFoundIsFailure, validation.discoveryCommandsMayNotSatisfyFinalValidation, commands.exactAllowedCommands, commands.hardDeniedCommands, commands.commandClasses, commands.runtimeCommandGrant, commands.validationEvidenceRules]
  gaps: >-
    Excellent command/test-execution authority model. Gaps: command objects are
    additionalProperties:true (shape not enforced); no formal ExecGate/verdict in-
    schema; zero-test-ran is a boolean flag not a structured detection rule.
  score_contribution: drives S5=0.90.

final_gate_fit:
  supportable: weak
  schema_primitives: [validation.finalValidationCommandRefs, commands.validationEvidenceRules.finalPromotionRequiresExactAllowedCommand, reports.reportsAreEvidenceOnly, reports.reportsDoNotAuthorizeExecution]
  gaps: >-
    FinalGate's LAW-3 CORE is not expressible: no human_approved, no human_id, no
    criteria_source, and acceptanceCriteria is unstructured so per-criterion
    evaluation cannot be schema-driven. No completion_policy. No verdict enum. The
    FinalGate model lives entirely in docs (praxis-task-yaml.contract.md,
    gate-verdict.contract.md), not in planspec.json.
  score_contribution: limits S6/S7.

repair_packet_fit:
  supportable: minimal
  schema_primitives: [workspace.rollback (open), reports.rollbackPlanRequiredForMutation]
  gaps: >-
    No RepairPacket schema. The RepairPacket contract (docs/contracts/repair-packet.
    contract.md) defines repair_packet_id/attempt_id/task_run_id/failure_signature/
    failed_gate/failed_criteria_ids/evidence_refs/strategy/strategy_context/prior_
    failures/scope_constraints/prompt_additions/generated_at, plus MUST NOT modify
    criteria/expand namespace/override verdicts. NONE of this is in planspec.json.
    The audit's desired repair shape (failedCriteriaOnly, mayModifyAcceptanceCriteria:
    false, allowedFiles, forbiddenFiles, requiredCommands, repairInstructions,
    reverifyCommand) is only partially covered by scope_constraints + prompt_additions.
  score_contribution: limits S8=0.10.

# ---------------------------------------------------------------------------
# v0.1 WEIGHT AND COMPLEXITY
# ---------------------------------------------------------------------------
v0_1_weight_and_complexity:
  root_required_fields: 17
  heavy_required_for_v0_1: [compatibility, intent, authority, enforcementRegistry, locking, waves, workspaces, commands]
  v0_1_excluded_concepts_forced_as_required:
    - waves[] (multi-worker scheduling) — ADR-013 future (v0.3+)
    - workspaces[] with waveId/batchSize/gate (multi-worker) — future
    - intent.parallelism (max 20) (multi-worker) — future
    - locking.workerMustEchoWorkspaceLockHash (multi-worker lock) — future
    - compatibility.runtimeContractVersion/v411AdapterRequired (runtime/Pi) — future/killed
  p44_v411_p45_baggage:
    - compatibility.v411AdapterRequired / generatedFromV411
    - p45Bridge (implementationAllowed:false, forbiddenRuntimePaths, artifactExports)
    - migration.legacyFieldsMapped (v411/planspec)
    - metadata.status enum (admitted/running/superseded — multi-worker lifecycle)
  verdict: >-
    Too heavy for a 1-2 day plugin-first v0.1. A v0.1 author would have to populate
    waves, workspaces, locking, compatibility, authority, enforcementRegistry, commands,
    brief, validation, evidence, reports for a single manual verify/repair task. This
    is the wrong altitude for v0.1.

# ---------------------------------------------------------------------------
# SCHEMA STRICTNESS RISKS
# ---------------------------------------------------------------------------
schema_strictness_risks:
  - risk: "Strict container, loose payload"
    detail: >-
      23 locked objects but 13 open payload objects. The envelope is strict, but the
      most important payload — acceptanceCriteria items (additionalProperties:true) —
      is unstructured, as are workspace.validation/reports/rollback/risk, command
      array items, and authority.* sub-objects. Strictness does not reach the content
      that gates actually evaluate.
  - risk: Dead definition
    detail: $defs/security is defined but never $ref'd; root security is an inline duplicate. Remove or $ref it.
  - risk: Multi-worker enums in a v0.1 context
    detail: metadata.status (admitted/running/superseded) and intent.parallelism(max 20) assume multi-worker runtime; misleading if used for v0.1.
  - risk: Unstructured command objects
    detail: exactAllowedCommands/commandClasses/hardDeniedCommands items are additionalProperties:true; command identity/args/exit-expectations are not enforceable.
  - risk: No conditional required logic
    detail: Plain required arrays; no if/then or dependentSchemas to make integrationContract required only when wiringRequired=true. Adding the wiring layer needs conditional schema constructs.

# ---------------------------------------------------------------------------
# FUTURE COMPATIBILITY
# ---------------------------------------------------------------------------
future_compatibility:
  preserves_well:
    - command policy (commands.*)
    - evidence ledger (evidence.*)
    - ACCP report authority (reports.reportsAreEvidenceOnly/reportsDoNotAuthorizeExecution/routeSignalsAreAdvisory)
    - lock/hash/signature integrity (security.*, locking.*)
    - allowed/forbidden file model
    - wave/workspace orchestration + dependency graphs (for v0.3 multi-worker)
  misaligned_with_praxis_future:
    - field names do not match docs/contracts/plan-spec.contract.md (plan_id/tasks[]/plan_budget/human_id/criteria_source/predicted_interfaces all absent)
    - P44/v4.11/P45 legacy (p45Bridge, v411AdapterRequired, migration.legacyFieldsMapped) is not PRAXIS's forward path
    - missing the artifact/wiring/repair layer needed even at scale for false-done prevention
  recommendation: >-
    Realign the future advanced PlanSpec to docs/contracts/plan-spec.contract.md
    (PRAXIS's own contract), not the v5-alpha2 P44 schema. Port the strong primitives
    (command policy, evidence, report authority, lock/hash) into that realigned
    schema. Archive planspec.json v5-alpha2 as a historical reference, not the
    canonical future PlanSpec.

# ---------------------------------------------------------------------------
# STRATEGY OPTIONS
# ---------------------------------------------------------------------------
strategy_options:
  - id: OPTION_A_FULL_PLANSPEC_V5
    name: Use current PlanSpec v5 directly for v0.1
    evaluation:
      speed: low — 17 required fields, multi-worker structure to populate per task
      complexity: high — waves/workspaces/locking/compatibility for single-session tasks
      false_positive_risk: high — unstructured AC + no wiring gate -> unwired code can PASS
      false_hold_risk: high — no artifactPolicy -> docs/config get import checks they don't need
      developer_ergonomics: low — heavy, foreign field names, P44 baggage
      v0_1_fit: poor (S2=0.30, S9=0.15)
    verdict: REJECT for v0.1
  - id: OPTION_B_TASK_YAML_PLUS_ADVANCED_PLANSPEC
    name: Use task.yaml for v0.1 and keep PlanSpec as advanced format
    evaluation:
      speed: high — task.yaml is flat, already contracted, already what /praxis:init generates
      complexity: low — single file, single session, manual loop
      truth_kernel_strength: medium-high — has structured AC, human_approved, verification_method, required_evidence; BUT lacks artifact/integration/wiring/repair (must be extended)
      migration_path: clear — plan_ref links task.yaml to future PlanSpec; extend task.yaml incrementally
      schema_duplication_risk: medium — two formats (task.yaml + future PlanSpec); mitigate by sharing $defs for AC/artifactPolicy/integrationContract
    verdict: RECOMMENDED (with task.yaml extension)
  - id: OPTION_C_PLANSPEC_LITE_PROFILE
    name: Create PlanSpec v0.1-lite profile within the PlanSpec family
    evaluation:
      schema_consistency: high — one family, versioned envelope (specVersion/kind/metadata/profile)
      v0_1_simplicity: medium — new profile to design and implement; envelope adds ceremony
      future_compatibility: high — profile can graduate to full PlanSpec
      implementation_effort: medium-high — must design a new lite profile AND migrate task.yaml users (or replace task.yaml)
    verdict: VIABLE ALTERNATIVE — converges with OPTION_B if task.yaml gains a specVersion/kind/metadata envelope
  - id: OPTION_D_REWRITE_SCHEMA
    name: REWRITE_SCHEMA (rewrite from scratch)
    evaluation:
      note: Not listed in the prompt's strategy enum but considered. Rewriting discards the strong command/evidence/report primitives. Net cost > benefit vs extending task.yaml.
    verdict: REJECT (preserve primitives; extend, do not rewrite)

# ---------------------------------------------------------------------------
# RECOMMENDED STRATEGY
# ---------------------------------------------------------------------------
recommended_strategy:
  strategy: TASK_YAML_PLUS_ADVANCED_PLANSPEC
  rationale: >-
    The design has already chosen .praxis/task.yaml as the v0.1 verification input
    (ADR-013, praxis-task-yaml.contract.md, mvp-v0.1-plugin-first-scope.md,
    claude-code-plugin-flow.md). planspec.json v5-alpha2 is a foreign Pi P44/v4.11/
    P45 schema with zero field-name overlap with PRAXIS's own contracts and forces
    v0.1-excluded multi-worker fields as required — it is not the v0.1 format and is
    not even PRAXIS's own future PlanSpec (plan-spec.contract.md). Confirming task.yaml
    avoids rework and schema duplication. The REAL gap is that task.yaml itself lacks
    the artifact/integration/wiring/repair/verification-authority layer needed for
    false-done prevention. Close that gap by EXTENDING task.yaml with a minimal
    artifactPolicy + integrationContract + structured-AC-authority + repair section.
    This makes task.yaml a de-facto PlanSpec-lite (OPTION_C in spirit) without a
    second competing format. Reserve the full advanced PlanSpec for the future,
    realigned to plan-spec.contract.md and porting the strong v5 primitives
    (command policy, evidence, report authority, lock/hash).
  convergence_with_option_c: >-
    If the team wants a formal versioned envelope, add specVersion/kind/metadata/
    profile fields to task.yaml. task.yaml + that envelope == PlanSpec-lite. OPTION_B
    and OPTION_C converge; OPTION_B is the lower-friction starting point.
  next_prompt_recommendation: >-
    Next prompt: "Design the task.yaml v0.1 extension: add artifactPolicy (class
    enum + class-default wiringRequired), integrationContract (required when
    wiringRequired/reachabilityRequired/executionRequired), a deterministic-vs-
    advisory verification authority model per AC, and a repair section
    (failedCriteriaOnly/mayModifyAcceptanceCriteria:false/allowedFiles/forbiddenFiles/
    requiredCommands/repairInstructions/reverifyCommand). Define the WiringGate
    insertion between EvidenceGate and ExecGate, its HOLD conditions for under-
    specified runtime_code, and the class-default wiring_required table. Produce a
    JSON Schema for the extended task.yaml and a PSAG-lite validation rule set. Design
    only; no implementation."

# ---------------------------------------------------------------------------
# MINIMUM VIABLE v0.1 SCHEMA
# ---------------------------------------------------------------------------
minimum_viable_v0_1_schema:
  format: .praxis/task.yaml (extended), NOT planspec.json
  required_top_level_or_task_level_fields:
    - specVersion (optional envelope; e.g. "praxis-task/0.1")
    - kind (optional; "Task" | "Plan-lite")
    - metadata (optional; task_id, title, description, created_at, human_id)
    - task_id
    - title
    - description
    - workspace
    - namespace
    - acceptance_criteria (structured)
    - required_commands
    - allowed_files
    - forbidden_files
    - evidence_requirements
    - completion_policy
    - human_approved
    - artifactPolicy (task-level defaults; overridable per AC)
    - integrationContract (required when any AC has wiringRequired=true)
    - repair (repair-packet contract reference + constraints)
  artifactPolicy_required_fields: [class, wiringRequired, reachabilityRequired, executionRequired]
  integrationContract_required_when_wiring_required: [mode, declaredUnits, "integrationPoints or exportSurfaces or usageProofs", "entrypoints when reachabilityRequired is true", "runtimeProbes when executionRequired is true"]
  acceptanceCriteria_required_fields: [id, description, level, humanApproved, verification, requiredEvidence]
  verification_required_fields: [type, deterministic, canSatisfyFinalGate, evidenceRefs]
  repair_required_fields: [failedCriteriaOnly, mayModifyAcceptanceCriteria, allowedFiles, forbiddenFiles, requiredCommands]
  dropped_from_planspec_for_v0_1: [waves, workspaces, locking, compatibility, p45Bridge, enforcementRegistry, authority, intent.parallelism, migration, renderHints]
  praxis_init_generates: >-
    .praxis/task.yaml skeleton (minimal shape above with one example AC + artifactPolicy
    stub), .praxis/runs/, .praxis/reports/, optional .praxis/config.yaml.
  praxis_verify_requires_before_pass:
    - human_approved is true (else FinalGate FAIL immediately)
    - all required AC met with deterministic evidence (canSatisfyFinalGate=true)
    - for runtime_code/cli_command ACs: integrationContract satisfied (wiring + reachability) OR explicit wiringRequired=false with reason
    - no empty diff when changes required (EvidenceGate HOLD/FAIL on DIFF_EMPTY)
    - no zero-tests when tests required (ExecGate FAIL on TESTS_RAN_ZERO)
    - required commands present in command log with exit code 0
    - no namespace violation (changes outside allowed_files)
    - no forbidden_patterns matched

# ---------------------------------------------------------------------------
# SCHEMA PATCH RECOMMENDATIONS
# ---------------------------------------------------------------------------
schema_patch_recommendations:
  note: >-
    Patches target the v0.1 format (extended task.yaml), NOT planspec.json. planspec.json
    is not modified (mutation_policy: report_only). The strong v5 primitives are PORTED
    into the extended task.yaml / future realigned PlanSpec.
  patches:
    - id: P-01
      target: acceptance_criteria items
      change: >-
        Replace additionalProperties:true with a structured AcceptanceCriterion: id,
        description, verification_method (enum), verification_detail, required_evidence,
        required (bool), human_approved (bool), criteria_source (enum human|agent),
        level (enum hard|soft|advisory), verification (object: type, deterministic,
        canSatisfyFinalGate, advisoryOnly, evidenceRefs).
      raises: S6 0.25->0.85; S7 partial
    - id: P-02
      target: artifactPolicy (per AC + task-level defaults)
      change: >-
        Add class enum (runtime_code/library_code/cli_command/test_only/documentation/
        config/schema/migration/script/generated_report/fixture), wiringRequired enum
        (true/false/consumer_or_export/runner_discovery/conditional), reachabilityRequired
        (bool), executionRequired (bool), advisoryReviewAllowed (bool),
        deterministicEvidenceRequired (bool).
      raises: S3 0.15->0.9; S4 partial
    - id: P-03
      target: integrationContract (required when wiringRequired/reachability/execution true)
      change: >-
        Add mode enum (none/required/consumer_or_export/runner_discovery/runtime_probe/
        manual_only), reason, declaredUnits[], integrationPoints[], entrypoints[],
        exportSurfaces[], usageProofs[], runtimeProbes[], forbiddenOrphanModules (bool).
        Use if/then or dependentSchemas to require entrypoints when reachabilityRequired,
        runtimeProbes when executionRequired.
      raises: S4 0.15->0.9
    - id: P-04
      target: repair section
      change: >-
        Add failedCriteriaOnly (bool, true), mayModifyAcceptanceCriteria (bool, false),
        allowedFiles[], forbiddenFiles[], requiredCommands[], repairInstructions,
        reverifyCommand. Port RepairPacket contract from docs into schema.
      raises: S8 0.10->0.7
    - id: P-05
      target: gate + verdict model
      change: >-
        Add gate enum (EvidenceGate/WiringGate/ExecGate/FinalGate), verdict enum
        (PASS/HOLD/FAIL), gate sequencing, reason_codes taxonomy (port from
        gate-verdict.contract.md). Insert WiringGate between EvidenceGate and ExecGate.
      raises: S7 0.35->0.95
    - id: P-06
      target: drop forced multi-worker required fields for v0.1 profile
      change: >-
        Remove waves/workspaces/locking/compatibility/p45Bridge/enforcementRegistry/
        authority/intent.parallelism from the v0.1 required set; reserve for future
        advanced PlanSpec profile.
      raises: S2 0.30->0.8; S9 0.15->0.8
    - id: P-07
      target: port strong v5 primitives
      change: >-
        Port commands.validationEvidenceRules, validation.finalValidationCommandRefs/
        noTestsFoundIsFailure/discoveryCommandsMayNotSatisfyFinalValidation,
        evidence.ledgerRequired/requiredEvidenceTypes/evidenceItemRequiredFields,
        reports.reportsAreEvidenceOnly/reportsDoNotAuthorizeExecution/
        routeSignalsAreAdvisory into the extended task.yaml.
      preserves: S5=0.9, S10
    - id: P-08
      target: class-default wiring_required
      change: >-
        Auto-derive wiringRequired from class when not explicit: runtime_code->true,
        cli_command->true, library_code->consumer_or_export, test_only->false,
        documentation->false, config/schema->conditional, migration->runner_discovery,
        script->conditional, fixture->optional_or_test_usage, generated_report->false.
        Missing class for a code artifact -> HOLD (under-specified).
      raises: S3->1.0; ergonomics

