report:
  id: PLANSPEC_V0_1_FITNESS_AUDIT
  status: HOLD
  status_meaning: >-
    Do not use planspec.json (PlanSpec v5-alpha2) directly for v0.1 until the schema
    strategy is decided. The schema is a valid, strict JSON Schema with strong
    command/evidence/report primitives, but it is the wrong lineage for PRAXIS v0.1:
    it forces v0.1-excluded multi-worker fields as required, has zero field-name
    overlap with PRAXIS's own contracts, leaves acceptanceCriteria unstructured, and
