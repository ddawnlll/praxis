required_audit_loops:
  L1_SCHEMA_STRUCTURE:
    schema_structure_findings:
      - valid Draft 2020-12 schema (meta-validated, jsonschema 4.26.0)
      - 9 $defs (briefNote, commands, compatibility, instruction, intent, metadata, security, wave, workspace)
      - 11 $ref, all resolve; no unresolvable refs
      - root additionalProperties:false; 23 locked objects, 13 open payload objects
      - 17 root required fields; 8 heavy/multi-worker
    strictness_findings:
      - strict envelope, loose payload (acceptanceCriteria unstructured)
      - $defs/security dead code (never $ref'd; inline duplicate at root)
      - command array items additionalProperties:true (shape not enforced)
      - multi-worker enums (metadata.status, intent.parallelism) misleading for v0.1
      - no conditional required logic (no if/then/dependentSchemas)
    v0_1_weight_findings:
      - too heavy: waves/workspaces/locking/compatibility/authority/enforcementRegistry required
      - P44/v4.11/P45 baggage: p45Bridge, v411AdapterRequired, migration.legacyFieldsMapped
      - zero field-name overlap with PRAXIS contracts
