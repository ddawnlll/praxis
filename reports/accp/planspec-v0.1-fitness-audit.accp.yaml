# ---------------------------------------------------------------------------
# EXECUTIVE SUMMARY
# ---------------------------------------------------------------------------
executive_summary: |
  planspec.json is a structurally valid Draft 2020-12 JSON Schema (meta-validated;
  all 11 $ref resolve). As a schema artifact it is well-formed: a strict envelope
  (additionalProperties:false at root and 22 other objects) wrapping strong
  command-policy, lock/hash, evidence-ledger, and report-authority primitives.

  But as the PRAXIS plugin-first v0.1 verification format it scores 3.6/10. Three
  structural facts drive that score:

  1. WRONG LINEAGE / ZERO OVERLAP. planspec.json is the Pi P44/v4.11/P45
     "PlanSpec v5-alpha2" schema. It shares ZERO field names with PRAXIS's own
     contracts: plan_id, tasks[], plan_budget, human_id, criteria_source,
     predicted_interfaces (from docs/contracts/plan-spec.contract.md) and
     task_id, namespace, acceptance_criteria, required_commands, human_approved,
     completion_policy, evidence_requirements (from praxis-task-yaml.contract.md)
     are ALL ABSENT. It carries P44/v4.11/P45 baggage: compatibility.v411AdapterRequired,
     p45Bridge (implementationAllowed:false, forbiddenRuntimePaths, artifactExports),
     migration.legacyFieldsMapped (v411/planspec). This is not PRAXIS's PlanSpec.

  2. FORCES v0.1-EXCLUDED WEIGHT. 17 root fields are required, 8 of them heavy
     multi-worker/runtime concepts that ADR-013 explicitly excludes from v0.1:
     waves[], workspaces[] (each with waveId/batchSize/gate), intent.parallelism
     (max 20), locking (workerMustEchoWorkspaceLockHash, hashes, lifecycle),
     compatibility (runtimeContractVersion, v411AdapterRequired), authority,
     enforcementRegistry, commands. A single-session manual verify/repair task
     cannot be expressed without populating all of these.

  3. MISSING THE FALSE-DONE-PREVENTION LAYER. The capabilities that matter most for
     "did the agent actually complete the task?" are absent: no artifactPolicy /
     artifact class, no integrationContract, no wiringRequired / reachabilityRequired,
     no declaredUnits / entrypoints / exportSurfaces / integrationPoints / runtimeProbes,
     no orphan-module detection, no RepairPacket schema, no formal gate model
     (no PASS/HOLD/FAIL enum, no WiringGate), no deterministic-vs-advisory verification
     authority model. Crucially, acceptanceCriteria items are additionalProperties:true
     — totally unstructured — so the schema cannot enforce id/verification_method/
     required_evidence/required/human_approved/criteria_source, i.e. FinalGate's
     Law-3 core is not expressible at the schema level.

  The design has ALREADY decided the v0.1 strategy: .praxis/task.yaml is the
  verification input (ADR-013, praxis-task-yaml.contract.md, mvp-v0.1-plugin-first-
  scope.md). PlanSpec is referenced only as an optional plan_ref. So the honest
  recommendation is to CONFIRM that decision (OPTION_B: task.yaml for v0.1, PlanSpec
  realigned as a future advanced format), and to close the real gap — which is NOT
  "adopt planspec.json" but "task.yaml itself lacks the artifact/integration/wiring/
  repair layer." That extension is the D2 deliverable.

  Verdict: HOLD. Do not use planspec.json directly for v0.1. Extend task.yaml with a
  minimal artifactPolicy + integrationContract + structured-AC + repair + verification-
  authority layer. Implementation of code remains NOT authorized (D4 + human gate).

