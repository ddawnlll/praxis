# ---------------------------------------------------------------------------
# CRITICAL QUESTION ANSWERS
# ---------------------------------------------------------------------------
critical_question_answers:
  statement: "Can the current PlanSpec express enough machine-checkable intent for PRAXIS to decide whether an LLM-produced change is actually complete?"
  answer: >-
    NO, not for the dimensions that matter most. It can express command/evidence
    intent well (S5=0.9) but cannot express artifact class, wiring, reachability,
    structured acceptance criteria, human approval, repair, or a formal gate model.
    It can decide "did the command run / did tests pass" but NOT "is this runtime
    code actually wired into the architecture" — so it cannot prevent false PASS on
    unwired code, and without artifactPolicy it cannot prevent false HOLD on docs.
  subquestions:
    distinguish_artifact_classes: "NO — no artifactPolicy/class; cannot distinguish runtime_code from docs/config/test_only."
    import_wiring_required_or_not: "NO — no wiringRequired field; cannot state whether import/wiring is required."
    integration_points_entrypoints_exports_probes_reachability: "NO — none of integrationPoints/entrypoints/exportSurfaces/usageProofs/runtimeProbes/reachability exist."
    prevent_false_pass_on_unwired_code: "NO — no wiring gate; file_exists can PASS on unwired code."
    prevent_false_hold_on_docs_config: "NO — no artifactPolicy; docs/config cannot declare not-import-required."
    support_evidence_wiring_exec_final_gates_and_repairpacket: "PARTIAL — Evidence/Exec primitives present; WiringGate absent; FinalGate core (human_approved) absent; RepairPacket absent from schema."
    remain_small_for_v0_1_while_preserving_advanced_power: "NO — it is heavy now (17 required, multi-worker) AND lacks the advanced false-done layer; it fails both ends."

# ---------------------------------------------------------------------------
# MUST ANSWER QUESTIONS
# ---------------------------------------------------------------------------
must_answer_questions:
  current_planspec_score_v0_1: 3.6
  current_planspec_score_advanced_future: 7.0
  strong_fields_to_keep:
    - commands.validationEvidenceRules (finalPromotionRequiresExactAllowedCommand, discoveryCommandsMayNotSatisfyFinalValidation, runtimeGrant validation-purpose rule, accpCompile accp-hash rule)
    - validation (finalValidationCommandRefs, noTestsFoundIsFailure, commandEvidenceRequired, discoveryCommandsMayNotSatisfyFinalValidation, forbiddenPatterns)
    - evidence (ledgerRequired, requiredEvidenceTypes, evidenceItemRequiredFields, hashWhenAvailable, accpArtifactHashRequired)
    - reports (reportsAreEvidenceOnly, reportsDoNotAuthorizeExecution, routeSignalsAreAdvisory, rollbackPlanRequiredForMutation, stableIdsRequired)
    - security (schemaValidationRequired, lockRequiredForExecution, canonicalJsonHashRequired, signatureRequired, hardStops, forbiddenFiles)
    - workspace.allowedFiles/forbiddenFiles (minItems:1)
    - wave.gate (commandRefs, requiredArtifacts)
    - brief instruction/briefNote priority (must/should/may)
  too_pi_p44_runtime_specific:
    - compatibility (runtimeContractVersion, runtimeTemplateVersion, v411AdapterRequired, generatedFromV411)
    - p45Bridge (implementationAllowed:false, forbiddenRuntimePaths, artifactExports)
    - migration.legacyFieldsMapped (v411/planspec)
    - intent.parallelism (max 20)
    - metadata.status enum (admitted/running/superseded)
    - locking.workerMustEchoWorkspaceLockHash
    - enforcementRegistry, authority.routing (runtime control plane)
  missing_for_wiring_gate:
    - wiringRequired, reachabilityRequired, executionRequired
    - declaredUnits, entrypoints, exportSurfaces, integrationPoints, usageProofs, runtimeProbes
    - import_graph verification, orphan_module detection, runtime_reachability
    - gate enum, verdict enum (PASS/HOLD/FAIL), gate sequencing, reason_codes
    - WiringGate itself (absent from schema AND design)
  missing_for_artifact_classification:
    - artifactPolicy, class enum, per-class wiring defaults
  missing_for_repair_packet:
    - failedCriteriaOnly, mayModifyAcceptanceCriteria, reverifyCommand, repairInstructions
    - allowedFiles/forbiddenFiles/requiredCommands in repair context
    - (RepairPacket contract exists in docs but not in schema)
  missing_for_deterministic_vs_advisory:
    - per-verification deterministic/canSatisfyFinalGate/advisoryOnly fields
    - (task.yaml has coarse required:true/false; planspec.json has neither)
  should_v0_1_use_full_planspec_task_yaml_or_planspec_lite: >-
    task.yaml (extended) — OPTION_B. Do NOT use planspec.json v5-alpha2 directly.
    Extending task.yaml with artifact/integration/wiring/repair makes it a de-facto
    PlanSpec-lite; OPTION_C converges if a specVersion/kind/metadata envelope is added.
  exact_changes_to_8_out_of_10: see score_improvement_plan.to_8_out_of_10 and schema_patch_recommendations P-01..P-07
  exact_changes_to_9_out_of_10: see score_improvement_plan.to_9_out_of_10 and schema_patch_recommendations P-05, P-08 + profile selection
  minimum_viable_v0_1_schema: see minimum_viable_v0_1_schema
  what_praxis_init_generates: ".praxis/task.yaml skeleton (minimal extended shape) + runs/ + reports/ + optional config.yaml"
  what_praxis_verify_requires_before_pass: see minimum_viable_v0_1_schema.praxis_verify_requires_before_pass
  default_wiring_required_behavior:
    by_class:
      runtime_code: true
      cli_command: true
      library_code: consumer_or_export
      test_only: false
      documentation: false
      config: conditional
      schema: conditional
      migration: runner_discovery
      script: conditional
      fixture: optional_or_test_usage
      generated_report: false
    missing_class: HOLD (under-specified; do NOT default to true (false-HOLDs docs) or false (false-PASSes code))
  when_praxis_should_hold_for_under_specified_runtime_code: >-
    HOLD (not FAIL) when an AC references a runtime_code artifact AND any of:
    artifactPolicy.class is missing; class=runtime_code with wiringRequired=true but
    integrationContract missing; reachabilityRequired=true but no entrypoints declared;
    executionRequired=true but no runtimeProbes/usageProofs declared. The plan is
    under-specified, not wrong; the repair packet asks the human to add the
    integrationContract.
  when_praxis_should_skip_wiring_checks: >-
    Skip wiring checks when artifactPolicy.class is non-code (documentation, test_only,
    config, schema, fixture, generated_report) AND wiringRequired is false or
    conditional-not-triggered. Always run wiring checks for runtime_code/cli_command
    unless wiringRequired is explicitly false with a stated reason. This prevents
    false-HOLD on docs/config/reports and false-PASS on unwired code.

