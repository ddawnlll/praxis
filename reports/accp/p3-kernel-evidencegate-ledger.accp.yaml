accp_version: "2.0.0"
source_format: "ACCP-YAML"
prompt_type: "implementation_report"
id: "ACCP-PRAXIS-P3-KERNEL-EVIDENCEGATE-LEDGER-REPORT"
title: "@praxis/kernel P3 Implementation Report — EvidenceLedger + EvidenceGate"
created_at: "2026-06-20T00:00:00+03:00"

executive_summary:
  verdict: "PASS"
  score: "18/18 acceptance criteria met"
  summary: >
    @praxis/kernel P3 is implemented with EvidenceLedger JSONL v0.1 and
    EvidenceGate. The EvidenceLedger provides JSONL reading, writing, appending,
    and validation. EvidenceGate validates evidence integrity, namespace
    compliance, required evidence mapping, and divergence detection.
    runP3Kernel composes SchemaGate → LockGate → EvidenceGate and stops there.
    No WiringGate, ExecGate, FinalGate, CLI, or plugin code was created.
    Contracts tests (31/31) and kernel tests (64/64, including P1/P2/P3) pass.
    Schema remains unchanged.

repo_discovery:
  repo_root: "/Users/hootie/praxis"
  contracts_package: "packages/contracts/ (31 tests, all pass)"
  kernel_package: "packages/kernel/ (64 tests, all pass)"
  schema_pack_status: "LOCKED — schemas/planspec.v0.1.schema.yaml (unchanged)"
  package_manager: "bun (1.3.3)"
  p1_status: "PASS_LOCKED — 31/31"
  p2_status: "PASS_LOCKED — 28/28 (included in 64)"

design_pack_reconciliation:
  enum_patch_needed: true
  enum_patch_applied: true
  details: >
    Design pack 04-evidenceledger-v0.1.contract.yaml used colon-description
    enum values (div:file:, div:tool:, div:output:). ACCP prompt
    required_pre_patch mandated normalization to divergence_file,
    divergence_tool, divergence_output. Implementation uses normalized
    snake_case values throughout. EvidenceRecordV01.type enum includes the
    normalized values. No colon-description syntax exists in code.
  evidence_types_normalized:
    - "div:file: → divergence_file"
    - "div:tool: → divergence_tool"
    - "div:output: → divergence_output"

evidence_ledger_model:
  format: "JSONL"
  file_extension: ".jsonl"
  canonical_version: "praxis-evidence/v0.1"
  record_shape:
    required_fields:
      - "evidenceVersion"
      - "recordId"
      - "attemptId"
      - "planId"
      - "timestamp"
      - "type"
      - "source"
    optional_fields:
      - "taskId"
      - "criterionId"
      - "path"
      - "paths"
      - "changedFile"
      - "status"
      - "summary"
      - "hash"
      - "metadata"
  record_id_pattern: "^EV-[A-Za-z0-9_.-]+$"
  evidence_types:
    - "diff, source, wiring, command, test_output, runtime_probe"
    - "schema_validation, manual_review, llm_advisory, report"
    - "changed_file (bookkeeping)"
    - "divergence_file, divergence_tool, divergence_output (bookkeeping, FAIL-causing)"
  evidence_sources:
    deterministic: ["kernel", "contracts", "hook", "cli", "test"]
    weak: ["agent_claim", "manual"]

evidence_ledger_implementation:
  files:
    - path: "packages/kernel/src/evidence/types.ts"
      purpose: "EvidenceRecordV01, ChangedFile, EvidenceGateInput, EvidenceGateResult, KernelP3Result types."
      status: "COMPLETE"
    - path: "packages/kernel/src/evidence/readEvidenceLedgerJsonl.ts"
      purpose: "Read and parse JSONL evidence ledger; parseEvidenceRecord exported."
      status: "COMPLETE"
    - path: "packages/kernel/src/evidence/writeEvidenceLedgerJsonl.ts"
      purpose: "Write complete JSONL ledger for tests/helpers."
      status: "COMPLETE"
    - path: "packages/kernel/src/evidence/appendEvidenceRecordJsonl.ts"
      purpose: "Append single EvidenceRecordV01 to JSONL file atomically enough for v0.1."
      status: "COMPLETE"
    - path: "packages/kernel/src/evidence/validateEvidenceLedger.ts"
      purpose: "Validate records against plan identity, task/AC ids, evidence types."
      status: "COMPLETE"
  jsonl_behavior:
    - "Each non-empty JSONL line parses as JSON object"
    - "Blank lines are ignored/skipped"
    - "Malformed JSON lines produce EVIDENCE_LEDGER_PARSE_ERROR diagnostics"
    - "Invalid evidenceVersion produces EVIDENCE_VERSION_MISMATCH"
    - "Missing required fields produce EVIDENCE_MISSING_REQUIRED_FIELD"
    - "Invalid recordId pattern produces EVIDENCE_INVALID_RECORD_ID"
  validation_checks:
    - "attemptId must match kernel attemptId"
    - "planId must match plan.metadata.planId"
    - "taskId references must exist in plan.tasks"
    - "criterionId references must exist in plan acceptanceCriteria"
    - "type must be declared in plan.evidence.requiredEvidenceTypes or be bookkeeping type"
    - "divergence record presence produces DIVERGENCE_DETECTED"
    - "required evidence types must be present per criterion"
    - "deterministic ACs must have at least one non-weak source record"

evidence_gate_implementation:
  file: "packages/kernel/src/gates/evidenceGate.ts"
  status: "COMPLETE"
  pass_conditions:
    - "Evidence ledger parses"
    - "attemptId and planId match"
    - "Changed files non-empty when implementation expected"
    - "All changed files inside allowedFiles"
    - "No changed file matches forbiddenFiles"
    - "Required evidence types for required ACs have matching records"
    - "Evidence records reference existing tasks and criteria"
    - "No divergence_* records present"
  hold_conditions:
    - "Evidence ledger missing for implementation plan → EVIDENCE_LEDGER_MISSING"
    - "Changed files empty for implementation plan → DIFF_EMPTY"
    - "Required evidence type missing → REQUIRED_EVIDENCE_TYPE_MISSING"
    - "Required criterion has no mapped evidence → CRITERION_EVIDENCE_MISSING"
    - "Agent_claim-only evidence for deterministic requirement → DETERMINISTIC_EVIDENCE_MISSING"
  fail_conditions:
    - "Evidence ledger malformed → EVIDENCE_LEDGER_PARSE_ERROR"
    - "Evidence version mismatch → EVIDENCE_VERSION_MISMATCH"
    - "attemptId mismatch → ATTEMPT_ID_MISMATCH"
    - "planId mismatch → PLAN_ID_MISMATCH"
    - "Forbidden file changed → FORBIDDEN_FILE_CHANGED"
    - "Changed file outside allowedFiles → CHANGED_FILE_OUTSIDE_ALLOWED_FILES"
    - "Unknown taskId reference → UNKNOWN_TASK_ID"
    - "Unknown criterionId reference → UNKNOWN_CRITERION_ID"
    - "Unsupported evidence type → UNSUPPORTED_EVIDENCE_TYPE"
    - "Divergence record present → DIVERGENCE_DETECTED"
  namespace_checks:
    glob_policy: "v0.1 supports exact match, prefix/** match, and * wildcard within segments."
    limitations: "No full gitignore semantics. Documented in code comments."
  required_evidence_mapping:
    - "For each required AC, inspects requiredEvidence"
    - "For each required evidence type, requires at least one record with matching criterionId and type"
    - "Deterministic evidence: at least one non-agent_claim record"
    - "Advisory-only ACs: skipped for required evidence mapping"
    - "Manual evidence allowed for manual_review type only"

p3_pipeline:
  file: "packages/kernel/src/runP3Kernel.ts"
  status: "COMPLETE"
  order:
    - "SchemaGate"
    - "LockGate"
    - "EvidenceGate"
  stop_conditions:
    - "SchemaGate FAIL → stop"
    - "LockGate FAIL → stop"
    - "LockGate HOLD → stop by default"
  future_gate_absence:
    - "WiringGate: NOT INVOKED ✅"
    - "ExecGate: NOT INVOKED ✅"
    - "FinalGate: NOT INVOKED ✅"

diagnostics:
  file: "packages/kernel/src/diagnostics.ts"
  status: "UPDATED"
  codes_added:
    pass: ["EVIDENCE_PASS"]
    hold:
      - "EVIDENCE_LEDGER_MISSING"
      - "DIFF_EMPTY"
      - "REQUIRED_EVIDENCE_TYPE_MISSING"
      - "CRITERION_EVIDENCE_MISSING"
      - "DETERMINISTIC_EVIDENCE_MISSING"
      - "EVIDENCE_INCOMPLETE"
      - "CHANGED_FILES_MISSING"
    fail:
      - "EVIDENCE_LEDGER_PARSE_ERROR"
      - "EVIDENCE_VERSION_MISMATCH"
      - "ATTEMPT_ID_MISMATCH"
      - "PLAN_ID_MISMATCH"
      - "FORBIDDEN_FILE_CHANGED"
      - "CHANGED_FILE_OUTSIDE_ALLOWED_FILES"
      - "UNKNOWN_TASK_ID"
      - "UNKNOWN_CRITERION_ID"
      - "UNSUPPORTED_EVIDENCE_TYPE"
      - "DIVERGENCE_DETECTED"

public_api:
  exports_added:
    types:
      - "EvidenceRecordV01"
      - "EvidenceLedgerReadResult"
      - "EvidenceGateInput"
      - "EvidenceGateResult"
      - "KernelP3Result"
      - "ChangedFile"
      - "ChangedFileStatus"
      - "EvidenceTypeV01"
      - "EvidenceSourceV01"
    functions:
      - "readEvidenceLedgerJsonl"
      - "writeEvidenceLedgerJsonl"
      - "appendEvidenceRecordJsonl"
      - "parseEvidenceRecord"
      - "validateEvidenceLedger"
      - "runEvidenceGate"
      - "runP3Kernel"
    diagnostics:
