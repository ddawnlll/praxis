      8 contracts are fully defined and ready to codify. 4 are sketches
      needing refinement. 3 need formal specification. 1 exists in pi/
      and can be ported. 5 gaps identified.

      The contract layer is mature enough to begin P0.2 (port execution-contracts)
      but the gaps should be filled before P2 (mock runtime vertical slice).

# ---------------------------------------------------------------------------
# SECTION 6: RISK REGISTER
# ---------------------------------------------------------------------------

risk_register:
  methodology: |
    Each risk is assessed for likelihood (1-5), impact (1-5), and severity
    (likelihood × impact). Severity >= 15 is CRITICAL, >= 10 is HIGH,
    >= 6 is MEDIUM, < 6 is LOW.

  risks:
    - risk_id: "RSK-001"
      category: "Process"
      description: |
        ADR numbering collision between architecture.md (ADR-001 through
        ADR-010) and README.md (ADR-001 through ADR-005). Two different
        decision registers use the same numbers. Agents and implementers
        following "ADR-001" will get different answers depending on which
        document they consult.
      likelihood: 5
      impact: 3
      severity: 15
      severity_label: "CRITICAL"
      mitigation: "Renumber README.md ADRs to ADR-011 through ADR-015. Create unified ADR index."
      owner: "Architecture lead"
      deadline: "Before any implementation"

    - risk_id: "RSK-002"
      category: "Process"
      description: |
        Phase misalignment across documents. Circuit Breaker is in Phase 3
        (architecture.md), Phase 1 Week 2 (README.md), and P3 (todo.md).
        ACCP compiler is similarly scattered. Implementation teams will not
        know which sequence to follow.
      likelihood: 4
      impact: 4
      severity: 16
      severity_label: "CRITICAL"
      mitigation: "Select authoritative source (recommend: todo.md for phase tracking). Align other documents."
      owner: "Architecture lead"
      deadline: "Before P0 implementation"

    - risk_id: "RSK-003"
      category: "Scope"
      description: |
        Desktop UI scope contradiction. README.md NOT IN SCOPE says
        "Dashboard / UI is a separate project." architecture.md and
        todo.md schedule it as P1. This directly affects resource
        planning and could cause teams to work on excluded scope.
      likelihood: 4
      impact: 4
      severity: 16
      severity_label: "CRITICAL"
      mitigation: "Explicit decision: is desktop UI in scope or not? Update all documents consistently."
      owner: "Project lead"
      deadline: "Before P1"

    - risk_id: "RSK-004"
      category: "Technical"
      description: |
        Day 0 Mandatory Spike has not been executed. The entire architecture
        assumes Claude Code can run headlessly with reliable hook capture.
        If the spike returns NO-GO, the Messages API fallback significantly
        changes the implementation complexity and agent capability.
      likelihood: 3
      impact: 5
      severity: 15
      severity_label: "CRITICAL"
      mitigation: "Execute Day 0 Spike immediately. Do not extend beyond 1 day. Decide GO/NO-GO."
      owner: "Implementation lead"
      deadline: "Before any Phase 0 work"

    - risk_id: "RSK-005"
      category: "Technical"
      description: |
        Zero implementation code exists. All architecture documents describe
        a system that has never been built. Unknown unknowns in the runtime
        model, FSM transitions, event ordering, and storage performance
        will only surface during implementation.
      likelihood: 5
      impact: 5
      severity: 25
      severity_label: "CRITICAL"
      mitigation: "Start P0.1 scaffold immediately. Prioritize vertical slice (P2) over full architecture."
      owner: "Implementation lead"
      deadline: "Ongoing — first code reduces this risk"

    - risk_id: "RSK-006"
      category: "Technical"
      description: |
        Claude Code hook system reliability is unverified. The PRAXIS Hook
        Layer is the foundation of ExecGate reliability. If hooks don't
        capture all tool events, the entire verification model weakens.
        PreToolUse hook availability is particularly uncertain.
      likelihood: 3
      impact: 5
      severity: 15
      severity_label: "CRITICAL"
      mitigation: "Day 0 Spike must test PreToolUse, PostToolUse, and Stop hooks for all tool types."
      owner: "Implementation lead"
      deadline: "Day 0 Spike"

    - risk_id: "RSK-007"
      category: "Technical"
      description: |
        PostgreSQL dependency adds operational complexity for a local-first
        tool. Users must have PostgreSQL installed and running. This is a
        significant barrier to entry compared to SQLite.
      likelihood: 4
      impact: 3
      severity: 12
      severity_label: "HIGH"
      mitigation: "Consider embedding PostgreSQL or providing a managed setup script. Document clearly."
      owner: "Infrastructure lead"
      deadline: "P2 storage implementation"

    - risk_id: "RSK-008"
      category: "Technical"
      description: |
        pi/ execution-contracts port has not started. The 247 existing tests
        are valuable but may not all port cleanly. Type namespace migration
        from @earendil-works/pi-* to @praxis/* may reveal hidden coupling.
      likelihood: 3
      impact: 3
      severity: 9
      severity_label: "MEDIUM"
      mitigation: "Start P0.2 immediately after P0.1 scaffold. Run existing tests as port progresses."
      owner: "Implementation lead"
      deadline: "P0.2"

    - risk_id: "RSK-009"
      category: "Architecture"
      description: |
        PredictedInterface pattern is novel and untested. It requires humans
        to predict shared package interfaces before workers implement them.
        Wrong predictions cause assembler conflicts. Planning quality directly
        affects execution quality in a way the system cannot compensate for.
      likelihood: 3
      impact: 3
      severity: 9
      severity_label: "MEDIUM"
      mitigation: "Start with Option A (exclusive namespace) and Option C (assembler-synthesized). Introduce Option B (PredictedInterface) after basic patterns are proven."
      owner: "Architecture lead"
      deadline: "P5 Parallel execution"

    - risk_id: "RSK-010"
      category: "Architecture"
      description: |
        RIM strategy effectiveness is theoretical. The 6-strategy rotation
        (initial → context_expand → tool_restrict → scope_narrow →
        knowledge_inject → hint_inject) has not been tested against real
        failure patterns. Strategies may not address actual failure causes.
      likelihood: 3
      impact: 3
      severity: 9
      severity_label: "MEDIUM"
      mitigation: "Monitor strategy effectiveness metrics from first real usage. Be prepared to adjust strategy order and content."
      owner: "Kernel team"
      deadline: "P4 Real worker integration"

    - risk_id: "RSK-011"
      category: "Architecture"
      description: |
        EHC Break Classifier (NOISE/SUSPECTED/CONFIRMED) is untested.
        False-positive CONFIRMED classifications would unnecessarily open
        the Circuit Breaker. False-negative classifications (real tampering
        classified as NOISE) would allow corruption to propagate.
      likelihood: 3
      impact: 4
      severity: 12
      severity_label: "HIGH"
      mitigation: "Comprehensive EHC classifier tests with known-good and known-bad chains. Chaos engineering in P5."
      owner: "Kernel team"
      deadline: "P3 Kernel safety core"

    - risk_id: "RSK-012"
      category: "Implementation"
      description: |
        Cross-platform desktop (Linux, macOS, Windows) adds significant
        complexity. Electron helps but worker process management, git
        worktree operations, and filesystem isolation behave differently
        across platforms.
      likelihood: 3
      impact: 3
      severity: 9
      severity_label: "MEDIUM"
      mitigation: "Test on all three platforms from P1 mockup. Use CI matrix."
      owner: "Interface team"
      deadline: "P1 Desktop mockup"

    - risk_id: "RSK-013"
      category: "Implementation"
      description: |
        Bun runtime is fast but less battle-tested than Node.js. Some npm
        packages may have compatibility issues. Electron + Bun integration
        path needs verification.
      likelihood: 3
      impact: 3
      severity: 9
      severity_label: "MEDIUM"
      mitigation: "Test critical dependencies early in P0.1. Have Node.js fallback plan for specific packages."
      owner: "Infrastructure lead"
      deadline: "P0.1 scaffold"

    - risk_id: "RSK-014"
      category: "Architecture"
      description: |
        Governor tier promotion requires 48h of continuous clean operation.
        This is a long validation window that could slow development
        iteration. During early phases, hitting 48h clean may be unrealistic
        while the system is still being debugged.
      likelihood: 4
      impact: 2
      severity: 8
      severity_label: "MEDIUM"
      mitigation: "Use shorter windows during development (e.g., 2h for dev, 48h for production qualification)."
      owner: "Kernel team"
      deadline: "P3 Governor implementation"

    - risk_id: "RSK-015"
      category: "Process"
      description: |
        Architecture documents are detailed but implementation has not
        started. Risk of analysis paralysis — continued architecture
        refinement without code to validate assumptions.
      likelihood: 4
      impact: 3
      severity: 12
      severity_label: "HIGH"
      mitigation: "Lock HARD_LOCK decisions now. Start P0.1 implementation. Use implementation feedback to refine SOFT_LOCK decisions."
      owner: "Project lead"
      deadline: "Immediate"

    - risk_id: "RSK-016"
      category: "Technical"
      description: |
        TestOutputParser must handle 7+ test runners with different output
        formats. Each runner has edge cases (parallel execution output,
        color codes, CI-specific formats). Parser reliability directly
        affects ExecGate accuracy.
      likelihood: 3
      impact: 3
      severity: 9
      severity_label: "MEDIUM"
      mitigation: "Build parser test suite with real runner outputs. Start with jest and vitest (most common in Bun/TS ecosystem)."
      owner: "Kernel team"
      deadline: "P3 Kernel safety core"

    - risk_id: "RSK-017"
      category: "Technical"
      description: |
        Assembler atomic git apply across multiple patches may encounter
        merge conflicts that git cannot resolve. The basic semantic check
        catches signature mismatches but not all semantic conflicts.
      likelihood: 3
      impact: 3
      severity: 9
      severity_label: "MEDIUM"
      mitigation: "Start with small waves (2-3 workers). Increase wave size as assembly reliability is proven."
      owner: "Kernel team"
      deadline: "P5 Parallel execution"

    - risk_id: "RSK-018"
      category: "Security"
      description: |
        Runtime security model relies on localhost binding + auth token.
        Token storage, rotation, and Electron preload security need careful
        implementation. A compromised token allows control of all workers.
      likelihood: 2
      impact: 4
      severity: 8
      severity_label: "MEDIUM"
      mitigation: "Use platform-specific secure storage. Implement token rotation. Audit Electron preload script."
      owner: "Server/Interface teams"
      deadline: "P6 Production hardening"

    - risk_id: "RSK-019"
      category: "Process"
      description: |
        Architecture documents are written for AI agents as the primary
        audience. Human developers joining the project may find the style
        unusual and the decision rationale implicit.
      likelihood: 3
      impact: 2
      severity: 6
      severity_label: "MEDIUM"
      mitigation: "Add a 'For Human Developers' section in README.md. Ensure ADRs have standard format."
      owner: "Architecture lead"
      deadline: "Before first non-AI contributor"

    - risk_id: "RSK-020"
      category: "Architecture"
      description: |
        The architecture specifies both a desktop UI (Electron) and a CLI
        as interfaces, but the NOT IN SCOPE list in README.md complicates
        this. If desktop UI is deferred, the CLI must carry all observability
        burden, which affects Phase 2 CLI design priorities.
      likelihood: 3
      impact: 3
      severity: 9
      severity_label: "MEDIUM"
      mitigation: "Resolve DIV-003. If desktop is deferred, expand CLI scope in Phase 2."
      owner: "Project lead"
      deadline: "Before P1"

  risk_summary:
    critical_risks: 5
    high_risks: 3
    medium_risks: 12
    low_risks: 0
    total: 20
    top_three:
      - "RSK-005: Zero implementation code exists (severity 25)"
      - "RSK-002: Phase misalignment across documents (severity 16)"
      - "RSK-003: Desktop UI scope contradiction (severity 16)"

# ---------------------------------------------------------------------------
# SECTION 7: IMPLEMENTATION READINESS
# ---------------------------------------------------------------------------

implementation_readiness:
  methodology: |
    Each implementation phase is assessed for: pre-requisites met,
    contracts available, risks acceptable, and whether work can begin.

  phase_assessments:
    - phase: "Day 0 Mandatory Spike"
      can_start: true
      blockers: []
      pre_requisites_met:
        - "Spike objectives clearly defined in README.md Section 0"
        - "GO/NO-GO criteria specified"
        - "Fallback architecture defined (ADR-005)"
      risks: ["RSK-004", "RSK-006"]
      recommendation: "START IMMEDIATELY. This is the highest-priority unblocked task."

