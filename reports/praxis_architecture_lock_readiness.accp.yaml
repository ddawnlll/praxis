      fallback: "Messages API may have different rate limits"

    - id: "OP-003"
      decision: "Desktop Mission Control UX design"
      rationale: "Needs mockup and user testing before locking."
      evidence: ["todo.md:354-387"]
      depends_on: "P1 Desktop mockup"

    - id: "OP-004"
      decision: "Runtime API exact request/response schemas"
      rationale: "Defined in sketch form; needs implementation to validate."
      evidence: ["architecture.md:665-785"]
      depends_on: "P2 Mock runtime vertical slice"

    - id: "OP-005"
      decision: "Event replay implementation details"
      rationale: "SSE replay is specified conceptually but not implemented."
      evidence: ["architecture.md:788-810"]
      depends_on: "P2 server/event-bus implementation"

    - id: "OP-006"
      decision: "Storage recovery behavior (crash recovery, WAL, backup)"
      rationale: "ACCP crash recovery specified; full storage recovery is not."
      evidence: ["architecture.md:2326-2334"]
      depends_on: "P6 production hardening"

    - id: "OP-007"
      decision: "Production installer approach (Electron-builder, pkg, etc.)"
      rationale: "Not yet evaluated for cross-platform requirements."
      evidence: ["todo.md:576"]
      depends_on: "P6 production hardening"

    - id: "OP-008"
      decision: "Long-run stability metrics and SLOs"
      rationale: "Cannot be defined without operational experience."
      evidence: ["todo.md:147"]
      depends_on: "Post-P6 operational running"

    - id: "OP-009"
      decision: "TestOutputParser full runner coverage"
      rationale: "Coverage grows over time. Unknown runners use exit_code fallback."
      evidence: ["readme.md:677-696"]
      depends_on: "Ongoing across all phases"

    - id: "OP-010"
      decision: "PredictedInterface accuracy and PSAG quality score calibration"
      rationale: "PredictedInterface is a novel pattern; needs real usage to validate."
      evidence: ["readme.md:1154-1208"]
      depends_on: "P5 Parallel execution"

  reject:
    - id: "RJ-001"
      decision: "WebSocket in MVP"
      reason: "Adds complexity without MVP need. SSE is sufficient."
      evidence: ["architecture.md:625-636"]

    - id: "RJ-002"
      decision: "SQLite instead of PostgreSQL"
      reason: "Insufficient for evidence-heavy, audit-heavy workload."
      evidence: ["architecture.md:820-828"]

    - id: "RJ-003"
      decision: "Root src/ directory"
      reason: "Destroys package boundaries. Explicitly forbidden."
      evidence: ["architecture.md:219-239", "todo.md:114"]

    - id: "RJ-004"
      decision: "Agent-generated acceptance criteria"
      reason: "Violates LAW 3. Echo chamber risk."
      evidence: ["readme.md:700-714", "readme.md:1820-1827"]

    - id: "RJ-005"
      decision: "Worker self-report as completion signal"
      reason: "Violates LAW 1. See false-done problem."
      evidence: ["architecture.md:110-116", "readme.md:74"]

    - id: "RJ-006"
      decision: "ACCP on execution critical path"
      reason: "Causes deadlock. Always async by ADR-001."
      evidence: ["readme.md:1792-1799", "todo.md:119"]

    - id: "RJ-007"
      decision: "Full migration of pi/ repository"
      reason: "Old architecture is coupled, wrong boundaries, wrong namespace."
      evidence: ["todo.md:11-43", "pi_reuse_readiness.accp.yaml"]

    - id: "RJ-008"
      decision: "Alembic without explicit ADR approval"
      reason: "Brings Python dependency into TypeScript/Bun repo."
      evidence: ["architecture.md:1698-1709"]

    - id: "RJ-009"
      decision: '"Unbounded" concurrency tier'
      reason: "stable_16 is the ceiling. 'Unbounded' is an accident, not a milestone."
