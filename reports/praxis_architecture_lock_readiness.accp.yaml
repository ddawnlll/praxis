        Input/output types are referenced but not fully specified.
        The pi/ execution-contracts has a richer WorkerAdapter with
        getCapabilities() — consider whether to include that.
      readiness: "READY_FOR_PORT"
      action: "Port from pi/packages/execution-contracts/src/worker-adapter.ts; adapt to @praxis/contracts"

    - contract: "TaskSpec interface"
      location: "readme.md Section 1 (lines 316-341)"
      status: "DEFINED"
      detail: |
