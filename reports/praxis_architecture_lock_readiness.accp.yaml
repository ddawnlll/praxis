# ---------------------------------------------------------------------------
# SECTION 8: ARCHITECTURE MATURITY SCORE
# ---------------------------------------------------------------------------

architecture_maturity:
  methodology: |
    Score each dimension 0-10 based on evidence in documents. Weight
    according to importance for implementation readiness.

  dimensions:
    - dimension: "Conceptual Integrity"
      weight: 0.20
      score: 9.0
      rationale: |
        Three Laws provide clear, non-negotiable foundation. Every component
        has a defined responsibility. Dependency direction is explicit.
        Circuit Breaker, Truth Engine, Governor, Assembler each have distinct
        questions they answer.
      weaknesses: ["ADR collision undermines integrity of decision register"]

    - dimension: "Cross-Document Consistency"
      weight: 0.20
      score: 5.0
      rationale: |
        Core concepts are consistent but structural issues exist: ADR numbering
        collision (DIV-001), phase misalignment (DIV-002, DIV-004, DIV-007),
        scope contradiction (DIV-003). These are fixable but currently prevent
        unambiguous implementation guidance.
      weaknesses:
        - "DIV-001: ADR numbering collision (HIGH)"
        - "DIV-002: CB phase placement (HIGH)"
        - "DIV-003: Desktop UI scope contradiction (HIGH)"
        - "DIV-004: ACCP phase placement (MEDIUM)"
        - "DIV-007: Phase naming conventions (LOW)"

    - dimension: "Contract Completeness"
      weight: 0.15
      score: 5.5
      rationale: |
        8 contracts are well-defined (TaskSpec, AcceptanceCriterion,
        EvidenceRecord, FailureSignature, RepairPacketV2, ConflictReport,
        PredictedInterface, WorkerAdapter sketch). 4 are sketches. 5 gaps
        identified (PlanSpec, AttemptManifest, GateVerdict, SSE payloads,
        command schemas). pi/ execution-contracts can fill some gaps during P0.2.
      weaknesses:
        - "No PlanSpec schema"
        - "No AttemptManifest schema"
        - "No formal GateVerdict types"
        - "SSE payloads not typed"

    - dimension: "Implementation Clarity"
      weight: 0.15
      score: 6.0
      rationale: |
        README.md implementation roadmap is detailed with day-by-day breakdown
        for Phase 0. todo.md has granular task lists with acceptance criteria.
        But phase misalignment means different documents give different
        implementation sequences. Once aligned, clarity will be high.
      weaknesses:
        - "Phase misalignment across documents"
        - "No estimated effort in person-days for most phases"

    - dimension: "Risk Awareness"
      weight: 0.10
      score: 7.0
      rationale: |
        README.md explicitly identifies open risks (Hook System reliability,
        TestOutputParser coverage, PredictedInterface accuracy). The Day 0
        Spike is a real go/no-go gate. NOT IN SCOPE list is comprehensive.
        This audit adds 20 structured risks.
      weaknesses:
        - "No quantitative risk thresholds defined"
        - "Risk ownership not assigned in source documents"

    - dimension: "Testability"
      weight: 0.10
      score: 7.5
      rationale: |
        Testing strategy defined in architecture.md Section 27. Required test
        categories enumerated. Mock worker specified for deterministic testing.
        False-done test suite planned (20+ cases). Circuit Breaker tests
        specified. EHC classifier tests specified.
      weaknesses:
        - "No test coverage targets defined"
        - "E2E test scope not fully specified"

    - dimension: "Operational Readiness"
      weight: 0.05
      score: 4.0
      rationale: |
        CLI observability specified for Phase 2. SSE event model is good for
        operations. But: no logging strategy beyond 'pino', no metrics
        collection design, no alerting model, no backup/recovery procedures.
        These are appropriately deferred to later phases.
      weaknesses:
        - "No production logging strategy"
        - "No metrics/monitoring design"
        - "No backup/recovery procedures"

    - dimension: "Reuse Strategy"
      weight: 0.05
      score: 8.5
      rationale: |
        pi/ reuse audit is complete and thorough. Clear classification of
        what to port, reference, and discard. Forbidden-copy list exists.
        P0 is explicitly a selective port, not a migration. The strategy
        is correct and well-documented in todo.md.
      weaknesses:
        - "Reuse policy not yet in ADR format"
        - "Architecture docs don't reference pi/ reuse decisions"

  weighted_total:
    formula: "sum(dimension.score × dimension.weight)"
    calculation: |
      9.0 × 0.20 = 1.80
      5.0 × 0.20 = 1.00
      5.5 × 0.15 = 0.825
      6.0 × 0.15 = 0.90
      7.0 × 0.10 = 0.70
      7.5 × 0.10 = 0.75
      4.0 × 0.05 = 0.20
      8.5 × 0.05 = 0.425
      ─────────────────
      TOTAL = 6.60 / 10
    rounded: "6.6/10"

# ---------------------------------------------------------------------------
# SECTION 9: GATE EVALUATION
# ---------------------------------------------------------------------------

gate_evaluation:
  gates:
    - gate: "GATE-001: Conceptual Completeness"
      question: "Are all major architectural concerns addressed?"
      verdict: "PASS"
      evidence: |
        Architecture covers: execution model, verification, repair,
        safety (Circuit Breaker), concurrency (Governor), assembly,
        ACCP artifacts, storage, communication, UI, security,
        cross-platform, testing. 32 sections in architecture.md.

    - gate: "GATE-002: Internal Consistency"
      question: "Do the architecture documents agree with each other?"
      verdict: "HOLD"
      evidence: |
        15 consistent decisions found. 7 divergences identified,
        including 3 HIGH severity (ADR collision, CB phase, Desktop scope).
        Documents agree on fundamentals but diverge on sequencing and scope.

    - gate: "GATE-003: Contract Sufficiency"
      question: "Are interfaces defined well enough to begin implementation?"
      verdict: "CONDITIONAL_PASS"
      evidence: |
        8 contracts ready to codify. 5 gaps identified. pi/ execution-contracts
        can fill the most critical gaps (ACCP types, command types) during P0.2.
        Sufficient for P0 but gaps should be closed before P2.

    - gate: "GATE-004: Risk Acceptability"
      question: "Are known risks acceptable to proceed?"
      verdict: "CONDITIONAL_PASS"
      evidence: |
        20 risks identified. 5 critical. Top critical risks (zero code, phase
        misalignment, scope contradiction, Day 0 unexecuted, hook unverified)
        are mitigatable. Key mitigations are process-level (resolve doc issues,
        execute spike) rather than architectural redesign.

    - gate: "GATE-005: Implementation Viability"
      question: "Can implementation begin with current architecture?"
      verdict: "CONDITIONAL_PASS"
      evidence: |
        Day 0 Spike and P-1 lock tasks can start immediately. P0.1 and P0.4
        can start in parallel. P0.2 and P0.3 are conditional on P0.1.
        All later phases are blocked on earlier gates. This is appropriate.

    - gate: "GATE-006: Reuse Policy Integrity"
      question: "Is the pi/ reuse policy correctly reflected?"
      verdict: "PASS"
      evidence: |
        todo.md and pi_reuse_readiness.accp.yaml are fully aligned.
        PORT_AND_ADAPT for contracts+compiler, REFERENCE_ONLY for FSM,
        DISCARD for everything else. Forbidden-copy list exists.

  final_gate_verdict: "HOLD"
  final_gate_rationale: |
    The architecture is conceptually sound and directionally correct.
    HARD_LOCK decisions are identified and justified. The Three Laws,
    top-level boundaries, and core safety invariants can and should be
    locked immediately.

    However, three HIGH-severity divergences prevent an unconditional
    PASS: ADR numbering collision (DIV-001), phase misalignment (DIV-002),
    and desktop UI scope contradiction (DIV-003). These are process-level
    issues that do not require architectural redesign but MUST be resolved
    before implementation proceeds beyond P-1.

    Additionally, the Day 0 Mandatory Spike has not been executed. The
    entire worker model depends on its outcome.

