    - id: "RJ-010"
      decision: "Full semantic conflict detection before Phase 3"
      reason: "Basic signature/call-site check in Phase 1 is sufficient."
      evidence: ["readme.md:1779-1781"]

    - id: "RJ-011"
      decision: "More than 2 ACCP report types (FVR + PRR) in MVP"
      reason: "One at a time. Add when operational need arises with evidence."
      evidence: ["readme.md:1754-1755"]

    - id: "RJ-012"
      decision: "Copying pi/packages/coding-agent, agent, brain, ai, db, web-server, web-ui, tui, worker-adapters, execution-service"
      reason: "These packages are either coupled to old architecture or implement wrong boundaries."
      evidence: ["todo.md:650-664", "pi_reuse_readiness.accp.yaml"]

# ---------------------------------------------------------------------------
# SECTION 4: REUSE POLICY VALIDATION
# ---------------------------------------------------------------------------

reuse_policy_validation:
  methodology: |
    Verify that the pi/ reuse audit findings are correctly reflected in
    todo.md and that no contradictions exist between the reuse policy
    and the architecture documents.

  audit_to_todo_alignment:
    verdict: "CONSISTENT"
    evidence:
      - check: "PORT_AND_ADAPT: execution-contracts → lib/contracts"
        audit_report: "Score 7.8/10, PORT_AND_ADAPT"
        todo_md: "P0.2 — Port execution-contracts to lib/contracts (line 215)"
        match: true

      - check: "PORT_AND_ADAPT: accp-compiler → kernel/accp"
        audit_report: "Score 7.5/10, PORT_AND_ADAPT"
        todo_md: "P0.3 — Port accp-compiler to kernel/accp (line 255)"
        match: true

      - check: "REFERENCE_ONLY: execution-runtime FSM patterns"
        audit_report: "Score 4.5/10, REFERENCE_ONLY"
        todo_md: "P0.4 — Extract old FSM reference doc (line 296)"
        match: true

      - check: "DISCARD: coding-agent, agent, brain, ai, db, web-server, web-ui, tui"
        audit_report: "All scored < 3.0, DISCARD"
        todo_md: "Forbidden Copy List (lines 650-664)"
        match: true

      - check: "DISCARD: worker-adapters, execution-service"
        audit_report: "DISCARD — service facades, wrong boundaries"
        todo_md: "Forbidden Copy List (lines 662-663)"
        match: true

  architecture_doc_alignment:
    verdict: "SILENT (acceptable)"
    detail: |
      architecture.md and README.md do not reference pi/ at all. This is
      intentional — they describe the target architecture, not the
      migration path. However, a brief reference in architecture.md
      Section 1 or in an ADR would prevent future agents from
      rediscovering pi/ and attempting full migration.
    recommendation: |
      Add ADR-XXX (or update todo.md P-1 tasks) documenting the pi/ reuse
      policy as an architecture decision. This closes the loop.

  naming_consistency:
    verdict: "CONSISTENT"
    detail: |
      Old namespace (@earendil-works/pi-*) is consistently replaced with
      @praxis/* across all documents. No @earendil-works references remain
      in any PRAXIS architecture document.

  forbidden_copy_enforcement:
    verdict: "ADEQUATE"
    detail: |
      todo.md has explicit forbidden-copy and reference-only lists.
      architecture.md and README.md do not repeat these lists but their
      boundary rules implicitly prevent copying old code into wrong layers.
    recommendation: |
      Add forbidden-copy list as a comment block in lib/contracts/src/
      and kernel/accp/src/ so that agents working in those directories
      see the constraint directly.

