# ---------------------------------------------------------------------------
# SECTION 3: LOCK CLASSIFICATION MATRIX
# ---------------------------------------------------------------------------

lock_matrix:
  methodology: |
    Each architectural decision is classified into one of four lock levels:
    - HARD_LOCK: Changing requires an ADR. Core to PRAXIS identity.
    - SOFT_LOCK: Default decision; can evolve during implementation with team consensus.
    - OPEN: Needs discovery, spike, mockup, or implementation proof before locking.
    - REJECT: Conflicts with PRAXIS goals or explicitly excluded.

    Classification is based on: presence in Three Laws, safety criticality,
    cross-document consistency, reversibility, and implementation dependency.

  hard_lock:
    - id: "HL-001"
      decision: "Three Non-Negotiable Laws (Completion Authority, Write Authority, Verification Authority)"
      rationale: "These define PRAXIS. Without them, the system is not PRAXIS."
      evidence: ["architecture.md:106-137", "readme.md:86-105", "todo.md:107-113"]
      locked_since: "v0.1"

    - id: "HL-002"
      decision: "Top-level boundaries: kernel/, adapters/, hooks/, server/, interface/, lib/"
      rationale: "The dependency direction and separation of concerns depend on these boundaries existing."
      evidence: ["architecture.md:142-217", "todo.md:113"]
      locked_since: "v0.1"

    - id: "HL-003"
      decision: "No root src/ directory"
      rationale: "Prevents boundary erosion. Each package owns its own src/."
      evidence: ["architecture.md:219-239", "todo.md:114"]
      locked_since: "v0.1"

    - id: "HL-004"
      decision: "Truth Engine is the sole completion authority (FinalGate PASS = done)"
      rationale: "LAW 1. No other component may declare completion."
      evidence: ["architecture.md:110-116", "readme.md:91-94"]
      locked_since: "v0.1"

    - id: "HL-005"
      decision: "Deterministic Assembler is the only shared writer"
      rationale: "LAW 2. Workers must not write to shared integration files."
      evidence: ["architecture.md:120-127", "readme.md:96-99"]
      locked_since: "v0.1"

    - id: "HL-006"
      decision: "Human-authored acceptance criteria only; agent-generated criteria rejected"
      rationale: "LAW 3. Echo chamber prevention."
      evidence: ["architecture.md:129-137", "readme.md:101-105", "readme.md:1820-1827"]
      locked_since: "v0.1"

    - id: "HL-007"
      decision: "Circuit Breaker is kernel-owned system safety component"
      rationale: "System-level safety must be independent of adapters, server, and interface."
      evidence: ["architecture.md:2025-2257", "readme.md:579-619", "todo.md:120"]
      locked_since: "v0.2"

    - id: "HL-008"
      decision: "ACCP artifacts are always async; never block execution critical path"
      rationale: "Prevents deadlock where verification speed gates admission speed."
      evidence: ["architecture.md:2303-2334", "readme.md:1086-1116", "readme.md:1792-1799", "todo.md:119"]
      locked_since: "v0.1"

    - id: "HL-009"
      decision: "Workers operate in isolated namespaces with exclusive file ownership"
      rationale: "LAW 2 implementation. Prevents namespace corruption."
      evidence: ["readme.md:1119-1208", "architecture.md (implicit in LAW 2)"]
      locked_since: "v0.2"

    - id: "HL-010"
      decision: "P0 is selective port from pi/, NOT a full migration"
      rationale: "Prevents agents from copying old architecture into PRAXIS."
      evidence: ["todo.md:11-43", "pi_reuse_readiness.accp.yaml"]
      locked_since: "2026-06-17 (post pi/ audit)"

    - id: "HL-011"
      decision: "HTTP + SSE communication; no WebSocket in MVP"
      rationale: "Simplicity, replay, debugging. WebSocket adds complexity without MVP need."
      evidence: ["architecture.md:592-660"]
      locked_since: "v0.1"

    - id: "HL-012"
      decision: "PostgreSQL primary database; no SQLite in MVP"
      rationale: "Evidence-heavy workload needs JSONB, transactions, durable event logs."
      evidence: ["architecture.md:814-828"]
      locked_since: "v0.1"

    - id: "HL-013"
      decision: "Event-sourced UI: snapshot + SSE event replay, UI never invents state"
      rationale: "Prevents UI from becoming a distributed authority."
      evidence: ["architecture.md:788-810"]
      locked_since: "v0.1"

    - id: "HL-014"
      decision: "lib/contracts must not contain PRAXIS business logic"
      rationale: "Dependency direction. lib is shared foundation, not domain logic."
      evidence: ["architecture.md:245-287", "todo.md:115"]
      locked_since: "v0.1"

    - id: "HL-015"
      decision: "Adapters must not decide completion or perform truth verification"
      rationale: "Separation of concerns. Adapters integrate; Truth Engine verifies."
      evidence: ["architecture.md:358-367", "todo.md:116"]
      locked_since: "v0.1"

    - id: "HL-016"
