# PRAXIS PlanSpec v0.1 — PulseQueue T01: Idempotent Job Creation
planSpecVersion: "0.1.0"
kind: "ImplementationPlan"
profile: "praxis-v0.1"

metadata:
  planId: "PRAXIS-2026-CAL-01"
  title: "Calibration 1: Golden PASS — perfect T01"
  description: "Implement POST /jobs with Idempotency-Key support, concurrent safety, and server wiring."
  createdAt: "2026-07-10T12:00:00Z"
  humanId: "calibration"
  status: "locked"

authority:
  executor: "ClaudeCode"
  completionAuthority: "PraxisTruthKernel"
  agentSelfReportIsClaimOnly: true
  criteriaSourceRequired: "human"
  reportsAreEvidenceOnly: true
  pluginOwnsTruth: false

workspace:
  root: "."
  allowedFiles:
    - "calibration/01-golden-pass/src/routes/jobs.ts"
    - "calibration/01-golden-pass/src/routes/index.ts"
    - "calibration/01-golden-pass/src/server.ts"
    - "calibration/01-golden-pass/src/queue/service.ts"
    - "calibration/01-golden-pass/src/queue/repository.ts"
    - "calibration/01-golden-pass/src/__tests__/*.test.ts"
  forbiddenFiles:
    - "calibration/01-golden-pass/src/index.ts"
    - "package.json"
    - "bun.lock"

execution:
  mode: "single_session"
  agent: "claude-code"
  autonomy: "implementation_allowed"
  canModifyCode: true
  canModifyPlan: false
  canModifyAcceptanceCriteria: false
  maxRepairLoops: 3

tasks:
  - id: "task-job-creation"
    title: "POST /jobs with Idempotency"
    objective: "Implement and wire POST /jobs endpoint with Idempotency-Key header support."

    implementation:
      instructions:
        - "Wire the existing job router (calibration/01-golden-pass/src/routes/jobs.ts) into the server entrypoint."
        - "Ensure QueueService.createJob is called with the Idempotency-Key header."
        - "Add concurrent idempotency safety (same key, simultaneous requests create one job)."
        - "Write tests for: valid creation, missing key, duplicate key, invalid payload, concurrent safety."
        - "Run full test suite to verify no regressions."
      suggestedSteps:
        - "Read calibration/01-golden-pass/src/routes/index.ts — understand the route registration pattern."
        - "Read calibration/01-golden-pass/src/server.ts — understand how the Hono app is created."
        - "Wire jobRouter into server, passing QueueService via context."
        - "Fix concurrent idempotency in repository/service if needed."
        - "Write concurrent safety test."
        - "Run bun test, bun run typecheck."
      antiPatterns:
        - "Do not modify calibration/01-golden-pass/src/index.ts entrypoint."
        - "Do not add new dependencies."
        - "Do not modify package.json."
      dependencies:
        - "calibration/01-golden-pass/src/server.ts"
        - "calibration/01-golden-pass/src/routes/index.ts"
      expectedOutputs:
        - "POST /jobs with valid payload returns 201."
        - "Duplicate Idempotency-Key returns existing job."
        - "Concurrent same-key requests create one job."

    artifactPolicy:
      class: "runtime_code"
      wiringRequired: true
      reachabilityRequired: true
      executionRequired: true
      deterministicEvidenceRequired: true
      advisoryReviewAllowed: false

    integrationContract:
      mode: "required"
      reason: "Job route must be wired into Hono server and reachable via HTTP POST /jobs."
      declaredUnits:
        - id: "job-route"
          path: "calibration/01-golden-pass/src/routes/jobs.ts"
          kind: "runtime_module"
          expectedExports:
            - "createJobRouter"
          requiredPatterns:
            - "export.*createJobRouter"
          language: "TypeScript"
      integrationPoints:
        - id: "server-setup"
          path: "calibration/01-golden-pass/src/server.ts"
          expectedImports:
            - "createJobRouter"
          expectedRegistrationPatterns:
            - "app.route"
            - "/jobs"
      entrypoints:
        - id: "post-jobs"
          path: "POST /jobs"
          kind: "http_endpoint"
          requiredReachabilityFrom:
            - "server entrypoint"
      runtimeProbes:
        - id: "create-job-probe"
          commandRef: "CMD-PROBE-CREATE"
          expectedOutputPatterns:
            - "201"
          expectedExitCode: 0
          proves:
            - "POST /jobs returns 201 for valid payload with Idempotency-Key."
      usageProofs:
        - id: "route-export-proved"
          commandRef: "CMD-CHECK-EXPORT"
          proves:
            - "createJobRouter is exported from routes/jobs.ts"

    acceptanceCriteria:
      - id: "AC-route-file"
        description: "Job route file calibration/01-golden-pass/src/routes/jobs.ts exists."
        level: "required"
        humanApproved: true
        criteriaSource: "human"
        verification:
          type: "file_exists"
          path: "calibration/01-golden-pass/src/routes/jobs.ts"
          deterministic: true
          canSatisfyFinalGate: true
          advisoryOnly: false
          evidenceRefs: ["diff", "source"]
        requiredEvidence: ["diff", "source"]

      - id: "AC-route-wired"
        description: "Job route is registered in server (wiring check via static pattern)."
        level: "required"
        humanApproved: true
        criteriaSource: "human"
        verification:
          type: "static_pattern"
          path: "calibration/01-golden-pass/src/server.ts"
          patterns:
            - "app.route('/jobs'"
          deterministic: true
          canSatisfyFinalGate: true
          advisoryOnly: false
          evidenceRefs: ["wiring", "source"]
        requiredEvidence: ["wiring", "source"]

      - id: "AC-idempotency-sequential"
        description: "Sequential same-key requests return same job ID."
        level: "required"
        humanApproved: true
        criteriaSource: "human"
        verification:
          type: "test_output"
          commandRef: "CMD-TEST-T01"
          patterns:
            - "pass"
            - "idempotency"
          deterministic: true
          canSatisfyFinalGate: true
          advisoryOnly: false
          evidenceRefs: ["test_output", "command"]
        requiredEvidence: ["test_output", "command"]

      - id: "AC-idempotency-concurrent"
        description: "Concurrent same-key requests create one job."
        level: "required"
        humanApproved: true
        criteriaSource: "human"
        verification:
          type: "test_output"
          commandRef: "CMD-TEST-T01"
          patterns:
            - "pass"
            - "concurrent"
          deterministic: true
          canSatisfyFinalGate: true
          advisoryOnly: false
          evidenceRefs: ["test_output", "command"]
        requiredEvidence: ["test_output", "command"]

      - id: "AC-validation-400"
        description: "Missing or invalid payload returns 400."
        level: "required"
        humanApproved: true
        criteriaSource: "human"
        verification:
          type: "test_output"
          commandRef: "CMD-TEST-T01"
          patterns:
            - "pass"
            - "400"
          deterministic: true
          canSatisfyFinalGate: true
          advisoryOnly: false
          evidenceRefs: ["test_output", "command"]
        requiredEvidence: ["test_output", "command"]

      - id: "AC-full-suite"
        description: "Full test suite passes with no regressions."
        level: "required"
        humanApproved: true
        criteriaSource: "human"
        verification:
          type: "test_output"
          commandRef: "CMD-TEST-FULL"
          patterns:
            - "0 fail"
          deterministic: true
          canSatisfyFinalGate: true
          advisoryOnly: false
          evidenceRefs: ["test_output", "command"]
        requiredEvidence: ["test_output", "command"]

      - id: "AC-typecheck"
        description: "TypeScript type check passes."
        level: "required"
        humanApproved: true
        criteriaSource: "human"
        verification:
          type: "command_output"
          commandRef: "CMD-TYPECHECK"
          patterns:
            - "noEmit"
          deterministic: true
          canSatisfyFinalGate: true
          advisoryOnly: false
          evidenceRefs: ["command"]
        requiredEvidence: ["command"]

commands:
  exactAllowedCommands:
    - id: "CMD-TEST-T01"
      kind: "final_validation"
      command: "cd /workspace/praxis/calibration/01-golden-pass && bun test src/__tests__/queue.test.ts"
      evidenceRequired: true
      timeoutSeconds: 120
      noTestsFoundIsFailure: true
      watchModeForbidden: true
      expectedExitCode: 0
      networkAllowed: false
      shellAllowed: true

    - id: "CMD-TEST-FULL"
      kind: "final_validation"
      command: "cd /workspace/praxis/calibration/01-golden-pass && bun test"
      evidenceRequired: true
      timeoutSeconds: 120
      noTestsFoundIsFailure: true
      watchModeForbidden: true
      expectedExitCode: 0
      networkAllowed: false
      shellAllowed: true

    - id: "CMD-TYPECHECK"
      kind: "typecheck"
      command: "cd /workspace/praxis/calibration/01-golden-pass && bun run typecheck"
      evidenceRequired: true
      timeoutSeconds: 60
      noTestsFoundIsFailure: false
      watchModeForbidden: true
      expectedExitCode: 0
      networkAllowed: false
      shellAllowed: true

    - id: "CMD-PROBE-CREATE"
      kind: "runtime_probe"
      command: "cd /workspace/praxis/calibration/01-golden-pass && bun run /workspace/praxis/benchmarks/pulsequeue-v01/scripts/probe-create.ts /workspace/praxis/calibration/01-golden-pass"
      evidenceRequired: true
      timeoutSeconds: 30
      noTestsFoundIsFailure: false
      watchModeForbidden: true
      expectedExitCode: 0
      expectedOutputPatterns:
        - "All probes passed."
      networkAllowed: true
      shellAllowed: true

    - id: "CMD-CHECK-EXPORT"
      kind: "final_validation"
      command: "bun run /workspace/praxis/benchmarks/pulsequeue-v01/scripts/check-export.ts /workspace/praxis/calibration/01-golden-pass src/routes/jobs.ts createJobRouter"
      evidenceRequired: true
      timeoutSeconds: 30
      noTestsFoundIsFailure: false
      watchModeForbidden: true
      expectedExitCode: 0
      networkAllowed: false
      shellAllowed: true

  validationEvidenceRules:
    finalPromotionRequiresExactAllowedCommand: true
    discoveryCommandsMayNotSatisfyFinalValidation: true
    runtimeGrantCommandsCanSatisfyValidationOnlyIfGrantStatesValidationPurpose: true

  hardDeniedCommands:
    - command: "rm -rf /"
      reason: "Destructive filesystem operation."
    - command: "git push --force"
      reason: "Force push prohibited."
    - command: "npm install"
      reason: "No new dependencies."
    - command: "bun add"
      reason: "No new dependencies."

evidence:
  ledgerRequired: true
  requiredEvidenceTypes:
    - "diff"
    - "source"
    - "wiring"
    - "command"
    - "test_output"
  hashWhenAvailable: true

gates:
  sequence:
    - "SchemaGate"
    - "LockGate"
    - "EvidenceGate"
    - "WiringGate"
    - "ExecGate"
    - "FinalGate"
  verdicts: ["PASS", "HOLD", "FAIL"]
  reasonCodes:
    SchemaGate: ["SCHEMA_INVALID", "SCHEMA_MISSING_REQUIRED", "SCHEMA_ADDITIONAL_PROPERTIES"]
    LockGate: ["LOCK_MISSING", "LOCK_HASH_MISMATCH", "LOCK_CRITERIA_CHANGED_AFTER_LOCK"]
    EvidenceGate: ["EVIDENCE_EMPTY", "DIFF_EMPTY", "NAMESPACE_VIOLATION", "FILES_CHANGED_MISMATCH"]
    WiringGate: ["WIRING_DECLARED_UNIT_MISSING", "WIRING_ENTRYPOINT_UNREACHABLE", "WIRING_EXPORT_MISMATCH", "WIRING_ORPHAN_MODULE", "WIRING_RUNTIME_PROBE_FAILED"]
    ExecGate: ["TESTS_RAN_ZERO", "TESTS_FAILURES", "EXIT_CODE_NONZERO", "FORBIDDEN_COMMAND"]
    FinalGate: ["ALL_CRITERIA_MET", "CRITERIA_PARTIAL", "CRITERIA_NONE_MET", "CRITERIA_NOT_HUMAN_APPROVED", "FILE_NOT_FOUND"]

repair:
  enabled: true
  failedCriteriaOnly: true
  mayModifyAcceptanceCriteria: false
  mayModifyPlan: false
  allowedFilesFromFailedTasksOnly: true
  maxRepairLoops: 3
  reverifyCommand: "cd /workspace/praxis/calibration/01-golden-pass && bun test src/__tests__/queue.test.ts"
  repairPacketFormat:
    json: true
    markdown: true

locking:
  lockRequired: true
  canonicalHashRequired: true
  planLockFile: ".praxis/planspec.lock"
  hashes:
    - "planHash"
    - "acceptanceCriteriaHash"
    - "artifactPolicyHash"
    - "integrationContractHash"
    - "commandPolicyHash"
    - "allowedFilesHash"
    - "forbiddenFilesHash"

reports:
  protocol: "ACCP"
  artifactDirectory: "reports/"
  reportsAreEvidenceOnly: true
  reportsDoNotAuthorizeExecution: true
  commandEvidenceRequired: true
  repairPacketRequiredOnHoldOrFail: true
