# RepairPacket v0.1 Contract
# accp_version: 2.0.0
# source_format: ACCP-YAML
# id: REPAIR_PACKET_V0_1_CONTRACT
# title: "PRAXIS RepairPacket v0.1 — JSON Format Contract"
# version: 0.1.0
# status: DESIGN_PROPOSAL
#
# Defines the RepairPacket v0.1 format: a JSON object generated by the
# kernel after a HOLD or FAIL verdict. The RepairPacket guides the next
# attempt by identifying what failed, what strategy to apply, and what
# constraints to follow.

contract:
  id: "repairpacket-v0.1"
  title: "RepairPacket v0.1 Format Contract"
  version: "0.1.0"
  status: "DESIGN_PROPOSAL"

  format:
    type: "json"
    reason: >-
      JSON is chosen over YAML or markdown because the RepairPacket is
      consumed by machines (the kernel feeds it to the next attempt),
      not read by humans directly. JSON gives: (1) no parsing ambiguity,
      (2) standard validation via JSON Schema, (3) native Node.js JSON
      support, (4) no format-skew risk from dual outputs.
      For human visibility, the CLI formats it on display.

  file_location:
    v0_1: ".praxis/repairs/<repair-packet-id>.json"
    note: "Generated automatically on HOLD/FAIL. Named by UUID v4."

  schema:
    type: object
    required:
      - repairPacketId
      - attemptId
      - taskRunId
      - planId
      - failureSummary
      - failedGates
      - strategy
      - strategyContext
      - priorFailureCount
      - generatedAt
    properties:

      repairPacketId:
        type: string
        description: "Unique identifier for this repair packet."
        format: "uuid"
        example: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"

      attemptId:
        type: string
        description: "The attempt that triggered this repair."
        example: "attempt-01"

      taskRunId:
        type: string
        description: "The task run being repaired."
        example: "run-001"

      planId:
        type: string
        description: "The plan ID from PlanSpec metadata."
        example: "plan-20260620-001"

      failureSummary:
        type: string
        description: "Human-readable summary of what failed."
        example: "EvidenceGate HOLD: no diff evidence for task 'implement-auth'. ExecGate HOLD: 2/5 tests failed."

      failedGates:
        type: array
        minItems: 1
        items:
          type: object
          required:
            - gateName
            - verdict
            - reasonCodes
            - failedCriteriaIds
          properties:
            gateName:
              type: string
              enum:
                - EvidenceGate
                - WiringGate
                - ExecGate
                - FinalGate
            verdict:
              type: string
              enum: [HOLD, FAIL]
            reasonCodes:
              type: array
              items:
                type: string
            failedCriteriaIds:
              type: array
              items:
                type: string
            repairHint:
              type: string
        description: "List of gates that returned HOLD or FAIL."

      strategy:
        type: string
        enum:
          - initial
          - context_expand
          - tool_restrict
          - scope_narrow
          - knowledge_inject
          - hint_inject
        description: "The strategy to apply for this repair."
        default: "initial"

      strategyContext:
        type: object
        description: "Strategy-specific parameters."
        oneOf:
          - properties:
              strategy: { const: "initial" }
              failureSummary: { type: string }
            required: [failureSummary]
          - properties:
              strategy: { const: "context_expand" }
              additionalReadPaths: { type: array, items: { type: string } }
              importGraphDepth: { type: integer, minimum: 1, maximum: 3 }
            required: [additionalReadPaths]
          - properties:
              strategy: { const: "tool_restrict" }
              readOnlyPass: { type: boolean }
              allowedTools: { type: array, items: { type: string } }
            required: [readOnlyPass]
          - properties:
              strategy: { const: "scope_narrow" }
              singleCriterionId: { type: string }
              narrowedPaths: { type: array, items: { type: string } }
            required: [singleCriterionId]
          - properties:
              strategy: { const: "knowledge_inject" }
              knowledgeSource: { type: string }
              injectedContent: { type: string }
            required: [knowledgeSource, injectedContent]
          - properties:
              strategy: { const: "hint_inject" }
              hintSource: { type: string, enum: [human, docs, pattern] }
              hintText: { type: string }
            required: [hintSource, hintText]

      priorFailureCount:
        type: integer
        minimum: 0
        maximum: 10
        description: "Number of previous failed attempts (0-based for the triggering attempt)."
        default: 0

      scopeConstraints:
        type: array
        items:
          type: string
        description: "Allowed file paths for the next attempt (subset of original allowedFiles)."
        optional: true

      promptAdditions:
        type: string
        description: "Text to append to the worker prompt for the next attempt."
        optional: true

      evidenceRefs:
        type: array
        items:
          type: string
        description: "Evidence record IDs relevant to this failure."
        optional: true

      generatedAt:
        type: string
        format: "date-time"
        description: "ISO 8601 timestamp of when this repair packet was generated."

      generatedBy:
        type: string
        enum: [kernel, human]
        description: "Who generated this repair packet. Kernel-generated on HOLD/FAIL. Human-generated for manual overrides."
        default: "kernel"

  # Strategy Rotation
  strategy_rotation:
    description: "Strategies advance automatically based on attempt number."
    sequence:
      - attempts: 1-2
        strategy: "initial"
        context: { failureSummary: "..." }
      - attempt: 3
        strategy: "context_expand"
        context: { additionalReadPaths: [...], importGraphDepth: 1 }
      - attempt: 4
        strategy: "tool_restrict"
        context: { readOnlyPass: true, allowedTools: [...] }
      - attempt: 5
        strategy: "scope_narrow"
        context: { singleCriterionId: "...", narrowedPaths: [...] }
      - attempt: 6
        strategy: "knowledge_inject"
        context: { knowledgeSource: "docs", injectedContent: "..." }
      - attempt: 7
        strategy: "hint_inject"
        context: { hintSource: "human", hintText: "..." }
      - attempt: 8+
        strategy: "ABORT"
        note: "Maximum repair loops exhausted. Human review required."

  # Generation Triggers
  triggers:
    - condition: "FinalGate verdict === HOLD"
      action: "Generate full RepairPacket with all failed gates and criteria"
    - condition: "FinalGate verdict === FAIL"
      action: "Generate RepairPacket with prior gate FAIL escalation"
    - condition: "Any gate FAIL (pre-FinalGate)"
      action: "Generate RepairPacket for that specific gate failure"
    - condition: "Pipeline ABORT (maxRepairLoops exhausted)"
      action: "Generate terminal RepairPacket with ABORT strategy"

  # MUST / MUST NOT Rules
  rules:
    must:
      - "RepairPacket MUST be generated ONLY on HOLD or FAIL outcomes"
      - "RepairPacket MUST include all failed gate information"
      - "Strategy MUST advance according to priorFailureCount"
      - "RepairPacket MUST be stored to .praxis/repairs/ directory"

    must_not:
      - "RepairPacket MUST NOT modify human-authored acceptance criteria"
      - "RepairPacket MUST NOT expand the task namespace beyond original"
      - "RepairPacket MUST NOT override gate verdicts"
      - "RepairPacket MUST NOT be generated on PASS outcomes"
      - "RepairPacket MUST NOT increase maxRepairLoops"

  # Acceptance Criteria
  acceptance_criteria:
    - id: "RP-AC-01"
      description: "RepairPacket is valid JSON — parses successfully."
      verification: "JSON.parse() succeeds."

    - id: "RP-AC-02"
      description: "RepairPacket has all required fields present."
      verification: "JSON Schema validation."

    - id: "RP-AC-03"
      description: "RepairPacket strategy matches priorFailureCount rotation."
      verification: "Check strategy against expected rotation sequence."

    - id: "RP-AC-04"
      description: "RepairPacket strategyContext matches strategy type."
      verification: "Validate strategyContext shape per strategy."

    - id: "RP-AC-05"
      description: "RepairPacket failedGates array has at least one entry."
      verification: "Length check."

    - id: "RP-AC-06"
      description: "RepairPacket is NOT generated on PASS outcomes."
      verification: "Assert no RepairPacket for PASS pipeline results."

    - id: "RP-AC-07"
      description: "RepairPacket scopeConstraints are subset of original allowedFiles."
      verification: "Set membership check."

    - id: "RP-AC-08"
      description: "RepairPacket is stored at expected path."
      verification: "fs.existsSync('.praxis/repairs/<id>.json')."

  # Design Decisions
  decisions:

    - id: "RP-DEC-01"
      question: "JSON or YAML or Markdown for RepairPacket?"
      answer: "JSON"
      rationale: >-
        RepairPacket is machine-consumed, not human-read. JSON is the
        standard machine format. CLI formatting handles human readability.
        Avoids dual-format maintenance burden.

    - id: "RP-DEC-02"
      question: "Strategy rotation automatic or manual?"
      answer: "Automatic based on attempt count"
      rationale: >-
        Manual strategy selection would require human judgment for every
        repair. Automatic rotation ensures systematic progression through
        increasingly targeted strategies. Human can override by providing
        a hint_inject or ABORT manually.

    - id: "RP-DEC-03"
      question: "Should RepairPacket include evidence refs?"
      answer: "Yes, optional"
      rationale: >-
        Evidence refs help the next attempt understand what went wrong.
        Optional because some gates (SchemaGate FAIL) produce no evidence.
